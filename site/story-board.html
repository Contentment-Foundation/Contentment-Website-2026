<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Story Board — Design Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Inter:wght@400;600;700&family=Newsreader:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:#FBFAF7; --teal:#1FAFC0; --ocean:#0080B0; --deep:#024E70; --green:#4FA98C;
    --ink:#1a2a32; --muted:#6b7a82; --card:#fff; --line:rgba(2,78,112,.1);
    --cork:#e9e0d2; --marker-yellow:#fff4b8; --marker-coral:#ffc9ad; --marker-mint:#c8f0e4;
    --marker-sky:#cce9ff; --washi-pink:rgba(255,190,200,.55); --washi-teal:rgba(31,175,192,.35);
    --washi-gold:rgba(255,220,130,.6);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--paper); color:var(--ink);
    font-family:Inter,system-ui,sans-serif; overflow:hidden; }
  #app { display:grid; grid-template-rows:auto auto 1fr; height:100vh; }

  .proto-banner { padding:9px 20px; background:#ffdd57; color:#4a3b00; font-size:12px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; border-bottom:1px solid rgba(0,0,0,.06); }
  .proto-banner a { color:var(--deep); font-weight:700; text-decoration:none; }
  .proto-banner a:hover { text-decoration:underline; }

  header { display:flex; align-items:center; gap:16px; flex-wrap:wrap; padding:12px 20px;
    background:rgba(255,255,255,.92); border-bottom:1px solid var(--line); backdrop-filter:blur(8px); z-index:20; }
  header h1 { margin:0; font-family:Newsreader,Georgia,serif; font-size:20px; font-weight:500; white-space:nowrap; }
  header h1 span { color:var(--ocean); position:relative; }
  header h1 span::after { content:""; position:absolute; left:-2px; right:-2px; bottom:1px; height:6px;
    background:linear-gradient(90deg,var(--marker-mint),var(--marker-sky)); opacity:.55; border-radius:2px; z-index:-1;
    transform:rotate(-1deg); }
  .diy-sub { display:block; font-family:Caveat,cursive; font-size:15px; font-weight:600; color:var(--ocean);
    letter-spacing:.2px; margin-top:2px; line-height:1; }
  .count { font-size:12px; color:var(--muted); font-family:Caveat,cursive; font-size:15px; font-weight:600; }
  .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-left:auto; }
  .chip { border:1.5px solid var(--line); background:#fff; color:var(--ink); padding:5px 12px;
    border-radius:999px; font-size:12px; cursor:pointer; transition:.15s; }
  .chip:nth-child(3n){ transform:rotate(-.6deg); }
  .chip:nth-child(3n+1){ transform:rotate(.5deg); }
  .chip:hover { border-color:var(--teal); }
  .chip.active { background:var(--ocean); color:#fff; border-color:var(--ocean); font-weight:600; transform:none; }
  .btn { border:1px solid var(--line); background:#fff; color:var(--ink); padding:6px 12px;
    border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; }
  .btn:hover { background:#f4f8fa; }
  .btn.active { background:var(--deep); color:#fff; border-color:var(--deep); }
  .btn-group { display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .btn-group .btn { border:none; border-radius:0; border-right:1px solid var(--line); }
  .btn-group .btn:last-child { border-right:none; }

  #viewport { position:relative; overflow:hidden; cursor:grab; touch-action:none;
    background:
      radial-gradient(ellipse 80% 50% at 15% 20%, rgba(79,169,140,.07), transparent 50%),
      radial-gradient(ellipse 60% 40% at 85% 75%, rgba(31,175,192,.06), transparent 45%),
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(2,78,112,.012) 3px, rgba(2,78,112,.012) 4px),
      linear-gradient(165deg, #ebe3d5 0%, var(--cork) 40%, #f2ebe2 100%); }
  #viewport.dragging { cursor:grabbing; }
  #viewport.grid-mode { overflow:auto; cursor:default; touch-action:auto; }
  #mapBg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; opacity:.42; }
  #mapBg path { fill:#b8d4e0; stroke:rgba(2,78,112,.12); stroke-width:.75px; }
  #boardLayer { position:absolute; inset:0; transform-origin:0 0; will-change:transform; }
  #boardSurface { position:relative; min-width:400px; min-height:400px; }
  #boardSurface.grid-layout {
    position:static; display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px; padding:24px; max-width:1400px; margin:0 auto; min-height:auto;
  }

  .frame-wrap { position:absolute; width:240px; transform-origin:50% 0; margin-top:18px;
    animation:pendulum var(--sway-dur,4.2s) ease-in-out infinite; animation-delay:var(--sway-delay,0s); }
  .grid-layout .frame-wrap { position:relative; width:auto; margin-top:0; animation:none; transform:none !important; }
  .frame-wrap::after { content:""; position:absolute; top:-22px; left:50%; width:11px; height:11px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--pin-hi,#ff8a8a), var(--pin,#e74c3c));
    box-shadow:0 2px 3px rgba(2,78,112,.28), inset 0 -2px 0 rgba(0,0,0,.12);
    transform:translateX(-50%); pointer-events:none; z-index:2; }
  .frame-wrap::before { content:""; position:absolute; top:-14px; left:50%; width:2px; height:14px;
    background:linear-gradient(to top, rgba(80,60,40,.35), rgba(80,60,40,.12));
    transform:translateX(-50%); pointer-events:none; z-index:1; }
  .grid-layout .frame-wrap::before, .grid-layout .frame-wrap::after { display:none; }
  .frame-wrap:hover { z-index:5; animation-play-state:paused; }
  .frame-wrap:hover .frame { box-shadow:0 14px 36px rgba(2,78,112,.2); }

  .frame { position:relative; width:100%; background:var(--card); box-shadow:0 8px 28px rgba(2,78,112,.12);
    border:1px solid var(--line); cursor:pointer; transition:box-shadow .2s; overflow:hidden; }
  .frame .media { position:relative; width:100%; aspect-ratio:4/3; overflow:hidden; background:#e8eef1; }
  .frame .media img { width:100%; height:100%; object-fit:cover; display:block; }
  .frame .play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(2,78,112,.25); color:#fff; font-size:28px; }
  .frame .body { padding:12px 14px 14px; }

  /* polaroid */
  .frame.shape-polaroid { border-radius:4px; padding:10px 10px 14px; border:1px solid #e0e4ea; background:#fff; }
  .frame.shape-polaroid .media { border-radius:2px; }
  .frame.shape-polaroid .body { padding:10px 4px 0; }

  /* soft rounded */
  .frame.shape-rounded { border-radius:16px; border-color:rgba(2,78,112,.1); }

  /* torn paper — ragged clip + warm paper tone */
  .frame.shape-torn { border:none; background:#fffef6;
    box-shadow:0 6px 22px rgba(2,78,112,.12), inset 0 0 0 1px rgba(2,78,112,.07);
    clip-path:polygon(0% 3%,4% 0%,9% 4%,15% 1%,21% 4%,28% 0%,35% 3%,42% 0%,49% 4%,56% 1%,63% 4%,70% 0%,77% 3%,84% 1%,91% 4%,97% 0%,100% 4%,
      100% 96%,96% 100%,89% 97%,82% 100%,75% 96%,68% 100%,61% 97%,54% 100%,47% 96%,40% 100%,33% 97%,26% 100%,19% 96%,12% 100%,5% 97%,0% 100%); }
  .frame.shape-torn .media { border-bottom:1px dashed rgba(2,78,112,.1); }

  /* admission ticket — notched ends + perforation */
  .frame.shape-ticket { border:2px dashed rgba(2,78,112,.28); border-radius:3px;
    background:linear-gradient(180deg,#fffef2,#fff);
    box-shadow:0 6px 18px rgba(2,78,112,.1), inset 0 0 0 4px #fffef2;
    clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px),0 10px); }
  .frame.shape-ticket .ticket-stamp { position:absolute; top:10px; right:10px; width:42px; height:42px;
    border:2px solid rgba(31,175,192,.45); border-radius:50%; opacity:.55; pointer-events:none;
    background:radial-gradient(circle at 30% 30%,transparent 55%,rgba(31,175,192,.12) 56%);
    font-size:7px; font-weight:800; color:rgba(2,78,112,.45); display:flex; align-items:center;
    justify-content:center; text-transform:uppercase; letter-spacing:.3px; transform:rotate(12deg); }
  .frame.shape-ticket .body { border-top:1px dotted rgba(2,78,112,.2); margin-top:0; }

  /* airmail postcard */
  .frame.shape-postcard { border:1px solid #c5d5de; background:#fff;
    box-shadow:3px 4px 0 rgba(2,78,112,.07); border-radius:2px; }
  .frame.shape-postcard::before { content:""; position:absolute; left:0; top:0; bottom:0; width:14px; z-index:1;
    background:repeating-linear-gradient(180deg,#e74c3c 0,#e74c3c 6px,#fff 6px,#fff 10px,#3b82c4 10px,#3b82c4 16px,#fff 16px,#fff 20px); opacity:.75; }
  .frame.shape-postcard .media { margin-left:14px; width:calc(100% - 14px); }
  .frame.shape-postcard .body { margin-left:14px; padding-left:10px; }

  /* luggage tag — angled corner cut */
  .frame.shape-tag { border:none; background:#f4faf7;
    clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,0 100%);
    box-shadow:0 8px 20px rgba(2,78,112,.11), inset 0 0 0 2px rgba(79,169,140,.35); }
  .frame.shape-tag .tag-hole { position:absolute; top:10px; right:10px; width:10px; height:10px;
    border:2px solid rgba(2,78,112,.25); border-radius:50%; background:#fff; }

  /* circle photo */
  .frame.shape-circle { border-radius:14px; }
  .frame.shape-circle .media { border-radius:50%; margin:12px auto 0; width:calc(100% - 24px); aspect-ratio:1; }

  /* arch top */
  .frame.shape-arch { border-radius:20px 20px 8px 8px; }
  .frame.shape-arch .media { border-radius:16px 16px 0 0; }

  /* notebook — margin + punch holes */
  .frame.shape-notebook { border:none; border-left:3px solid rgba(255,120,100,.45);
    background:linear-gradient(90deg,#fff8f5 28px,#fff 28px);
    box-shadow:0 6px 20px rgba(2,78,112,.1);
    background-image:
      radial-gradient(circle at 14px 24px, #fff 3px, rgba(2,78,112,.15) 3.5px, transparent 4px),
      radial-gradient(circle at 14px 54px, #fff 3px, rgba(2,78,112,.15) 3.5px, transparent 4px),
      radial-gradient(circle at 14px 84px, #fff 3px, rgba(2,78,112,.15) 3.5px, transparent 4px),
      linear-gradient(90deg,#fff8f5 28px,#fff 28px); }
  .frame.shape-notebook .body { padding-left:10px; }

  /* sticky note — classroom DIY classic */
  .frame.shape-sticky { border:none; background:var(--marker-yellow);
    box-shadow:2px 4px 0 rgba(2,78,112,.08), 0 10px 24px rgba(2,78,112,.1);
    transform:none; }
  .frame.shape-sticky .media { display:none; }
  .frame.shape-sticky .body { padding:16px 14px 18px; min-height:200px; }
  .frame.shape-sticky .quote { font-family:Caveat,cursive; font-style:normal; font-size:17px; font-weight:600;
    line-height:1.3; -webkit-line-clamp:5; }

  /* washi tape strips */
  .washi { position:absolute; z-index:4; height:16px; width:54px; opacity:.78; pointer-events:none;
    box-shadow:0 1px 2px rgba(0,0,0,.06); mix-blend-mode:multiply; }
  .washi.t0 { top:-7px; left:14px; transform:rotate(-7deg); background:var(--washi-gold); }
  .washi.t1 { top:-6px; right:12px; transform:rotate(9deg); background:var(--washi-teal); }
  .washi.t2 { bottom:42px; left:-8px; transform:rotate(68deg); background:var(--washi-pink); width:44px; }
  .washi.t3 { top:48%; right:-10px; transform:rotate(-62deg); background:var(--marker-mint); width:40px; opacity:.65; }

  /* tiny doodle stickers on some cards */
  .sticker { position:absolute; z-index:4; font-size:15px; line-height:1; pointer-events:none;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.1)); opacity:.85; }

  /* bulletin board doodles (pan with the board) */
  .board-doodles { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:visible; }
  .board-doodles span { position:absolute; font-family:Caveat,cursive; font-weight:600; color:rgba(2,78,112,.14);
    font-size:28px; line-height:1; user-select:none; }
  .board-doodles .d1 { top:60px; left:80px; transform:rotate(-12deg); font-size:34px; }
  .board-doodles .d2 { top:200px; right:120px; transform:rotate(8deg); }
  .board-doodles .d3 { bottom:180px; left:200px; transform:rotate(-5deg); font-size:22px; color:rgba(79,169,140,.2); }
  .board-doodles .d4 { bottom:100px; right:80px; transform:rotate(14deg); font-size:40px; opacity:.7; }
  .board-doodles svg { position:absolute; opacity:.12; }

  .badge { display:inline-block; font-family:Caveat,cursive; font-size:13px; font-weight:600;
    text-transform:none; letter-spacing:.2px; padding:1px 9px 3px; border-radius:4px;
    margin-bottom:6px; transform:rotate(-1.5deg); box-shadow:0 1px 0 rgba(0,0,0,.06); }
  .badge.educator { background:var(--marker-sky); color:#1a5f8a; border:1px solid rgba(28,111,184,.15); }
  .badge.student { background:var(--marker-mint); color:#1f6b4a; border:1px solid rgba(42,125,71,.15); }
  .frame .place { font-size:11px; color:var(--muted); margin-bottom:4px; font-family:Caveat,cursive; font-weight:600; }
  .frame .quote { font-family:Newsreader,Georgia,serif; font-style:italic; font-size:14px; line-height:1.35;
    color:var(--deep); margin:0 0 6px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .frame .by { font-size:11px; color:var(--muted); font-weight:600; }

  @keyframes pendulum {
    0%,100% { transform:rotate(calc(var(--rot,0deg) - var(--swing,2deg))); }
    50% { transform:rotate(calc(var(--rot,0deg) + var(--swing,2deg))); }
  }
  @media (prefers-reduced-motion:reduce){
    .frame-wrap { animation:none !important; }
    #boardLayer { transition:none !important; }
  }

  #modalBg { position:fixed; inset:0; background:rgba(2,78,112,.35); z-index:50; opacity:0;
    pointer-events:none; transition:opacity .2s; }
  #modalBg.show { opacity:1; pointer-events:auto; }
  #modal { position:fixed; z-index:60; left:50%; top:50%; width:min(520px,94vw); max-height:88vh;
    background:#fff; border-radius:16px; box-shadow:0 24px 60px rgba(0,0,0,.2); overflow:hidden;
    transform:translate(-50%,-50%) scale(.96); opacity:0; pointer-events:none; transition:.2s;
    display:flex; flex-direction:column; }
  #modal.show { transform:translate(-50%,-50%) scale(1); opacity:1; pointer-events:auto; }
  #modal .mclose { position:absolute; top:10px; right:10px; z-index:2; width:30px; height:30px;
    border-radius:50%; border:none; background:rgba(0,0,0,.4); color:#fff; font-size:18px; cursor:pointer; }
  #modal .mmedia-wrap { position:relative; background:#e8eef1; }
  #modal .mmedia { width:100%; height:200px; object-fit:cover; display:block; }
  #modal .mvideo { width:100%; aspect-ratio:16/9; border:0; display:none; }
  #modal .mmedia-wrap.has-video .mmedia { display:none; }
  #modal .mmedia-wrap.has-video .mvideo { display:block; }
  #modal .mbody { padding:18px 22px 22px; overflow-y:auto; }
  #modal .mrole { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--ocean); }
  #modal .mplace { font-size:12px; color:var(--muted); margin:4px 0 12px; }
  #modal .mq { font-family:Newsreader,Georgia,serif; font-style:italic; font-size:18px; color:var(--deep); margin:0 0 14px; line-height:1.4; }
  #modal .mtext { font-size:14px; line-height:1.75; color:#444; }
  #modal .mby { margin-top:14px; font-size:12px; color:var(--muted); font-weight:600; }

  .zoom-hint { position:absolute; bottom:14px; left:14px; font-size:13px; color:var(--deep);
    font-family:Caveat,cursive; font-weight:600;
    background:rgba(255,255,255,.88); padding:7px 12px; border-radius:4px; pointer-events:none;
    border:1.5px dashed rgba(2,78,112,.18); transform:rotate(-1deg); box-shadow:2px 3px 0 rgba(2,78,112,.06); }
  #viewport.grid-mode .zoom-hint { display:none; }
</style>
</head>
<body>
<div id="app">
  <div class="proto-banner" role="status">
    <span><strong>Design prototype</strong> — Story Board for team review. Not on the live homepage yet.</span>
    <a href="index.html">← Homepage</a>
    <a href="foundation-reach-map.html">Foundation Reach map →</a>
    <a href="story-board-feed-guide.html">How to add stories &amp; media →</a>
  </div>
  <header>
    <div>
      <h1>Story <span>Board</span></h1>
      <span class="diy-sub">voices pinned from classrooms around the world</span>
    </div>
    <span class="count" id="countLabel">0 stories</span>
    <div class="controls">
      <div id="regionFilters"></div>
      <button type="button" class="chip" data-role="all">All voices</button>
      <button type="button" class="chip" data-role="educator">Educators</button>
      <button type="button" class="chip" data-role="student">Students</button>
      <div class="btn-group">
        <button type="button" class="btn active" id="btnBoard">Board</button>
        <button type="button" class="btn" id="btnGrid">Grid</button>
      </div>
      <button type="button" class="btn" id="btnFit" title="Fit all frames">Fit board</button>
      <button type="button" class="btn" id="btnReset" title="Default readable zoom">Reset</button>
      <button type="button" class="btn" id="btnZoomIn">+</button>
      <button type="button" class="btn" id="btnZoomOut">−</button>
    </div>
  </header>
  <div id="viewport">
    <svg id="mapBg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
    <div id="boardLayer">
      <div id="boardSurface"></div>
    </div>
    <div class="zoom-hint">drag to explore · scroll to zoom · tap a story ♥</div>
  </div>
</div>
<div id="modalBg"></div>
<div id="modal">
  <button type="button" class="mclose" id="mClose" aria-label="Close">×</button>
  <div class="mmedia-wrap" id="mMediaWrap">
    <img class="mmedia" id="mImg" alt="" />
    <iframe class="mvideo" id="mVideo" title="Story video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
  <div class="mbody">
    <div class="mrole" id="mRole"></div>
    <div class="mplace" id="mPlace"></div>
    <div class="mq" id="mQ"></div>
    <div class="mtext" id="mText"></div>
    <div class="mby" id="mBy"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="program-data.js"></script>
<script>
const SHAPES=[
  "shape-sticky","shape-polaroid","shape-torn","shape-ticket","shape-postcard","shape-tag",
  "shape-rounded","shape-notebook","shape-circle","shape-arch"
];
const PIN_COLORS=[
  ["#ff8a8a","#e74c3c"],["#7ec8e8","#3498db"],["#9be7b8","#4FA98C"],
  ["#ffd07a","#f39c12"],["#d7b0ff","#9b59b6"],["#ffb8b8","#e67e80"]
];
const STICKERS=["★","♥","✿","☀","✦","🌱"];
const REGIONS=["All","Americas","Africa","Asia","Europe","Oceania"];
const VIDEO_EVERY=7; // every 7th story gets a placeholder video badge

let stories=[], filtered=[], activeRegion="All", activeRole="all";
let gridMode=window.matchMedia("(max-width:820px)").matches;
let scale=1, panX=0, panY=0, dragging=false, dragX=0, dragY=0;

const viewport=document.getElementById("viewport");
const boardLayer=document.getElementById("boardLayer");
const boardSurface=document.getElementById("boardSurface");
const modal=document.getElementById("modal"), modalBg=document.getElementById("modalBg");

function hash(n){ return ((n*2654435761)>>>0)%1000; }
function nameOf(k){ return PROGRAM[k].label||k; }

function buildStories(){
  const out=[];
  let n=0;
  Object.keys(PROGRAM).forEach(k=>{
    const place=nameOf(k), region=PROGRAM[k].region;
    (PROGRAM[k].stories||[]).forEach(s=>{
      out.push({
        id:n, place, region, role:s.role||"educator", q:s.q, text:s.text, full:s.full,
        by:s.by, img:s.img, cap:s.cap, video:s.video||null,
        hasVideo:!!s.video||(n%VIDEO_EVERY===3),
        shape:SHAPES[n%SHAPES.length],
        tape:"t"+(n%4),
        pin:PIN_COLORS[n%PIN_COLORS.length],
        sticker:n%3===0?STICKERS[n%STICKERS.length]:null,
        rot:((hash(n)%7)-3)+"deg",
        swing:((hash(n*3)%25)/10+1.2).toFixed(1)+"deg",
        swayDur:(3.8+(hash(n*5)%35)/10).toFixed(1)+"s",
        swayDelay:(hash(n*11)%20)/10+"s"
      });
      n++;
    });
  });
  return out;
}

function inFilter(s){
  return (activeRegion==="All"||s.region===activeRegion)&&
    (activeRole==="all"||s.role===activeRole);
}

function layoutBoard(){
  const PAD=40, NAIL=22, CARD_W=240, CARD_H=318;
  const cols=Math.ceil(Math.sqrt(filtered.length||1));
  filtered.forEach((s,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const jx=(hash(s.id*17)%100)-50, jy=(hash(s.id*23)%80)-40;
    s._x=col*280+jx;
    s._y=row*340+jy;
  });
  const minX=Math.min(...filtered.map(s=>s._x));
  const minY=Math.min(...filtered.map(s=>s._y));
  filtered.forEach(s=>{ s._x=s._x-minX+PAD; s._y=s._y-minY+PAD+NAIL; });
  const maxX=Math.max(...filtered.map(s=>s._x))+CARD_W+PAD;
  const maxY=Math.max(...filtered.map(s=>s._y))+CARD_H+PAD;
  boardSurface.style.width=maxX+"px";
  boardSurface.style.height=maxY+"px";
}

function renderCards(){
  filtered=stories.filter(inFilter);
  document.getElementById("countLabel").textContent=
    filtered.length+" "+(filtered.length===1?"story":"stories");
  if(!gridMode) layoutBoard();
  boardSurface.innerHTML=(gridMode?"":`<div class="board-doodles" aria-hidden="true">
      <span class="d1">our stories</span>
      <span class="d2">you belong here</span>
      <span class="d3">thank you!</span>
      <span class="d4">✿</span>
      <svg width="90" height="90" style="top:140px;left:40px" viewBox="0 0 90 90"><path d="M10,45 Q30,10 55,30 T80,50" fill="none" stroke="#024E70" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="70" height="70" style="bottom:60px;right:160px" viewBox="0 0 70 70"><path d="M8,35 Q25,8 45,28 T62,42" fill="none" stroke="#4FA98C" stroke-width="2" stroke-linecap="round"/></svg>
    </div>`)+filtered.map(s=>`
    <div class="frame-wrap" data-id="${s.id}" style="${gridMode?"":`
      left:${s._x}px;top:${s._y}px;--rot:${s.rot};--swing:${s.swing};
      --sway-dur:${s.swayDur};--sway-delay:${s.swayDelay};
      --pin:${s.pin[1]};--pin-hi:${s.pin[0]};`}">
      <span class="washi ${s.tape}" aria-hidden="true"></span>
      ${s.sticker?`<span class="sticker" style="top:${s.shape==="shape-sticky"?"8":"6"}px;left:${8+(hash(s.id)%30)}px;transform:rotate(${(hash(s.id)%20)-10}deg)">${s.sticker}</span>`:""}
      <article class="frame ${s.shape}">
        ${s.shape==="shape-ticket"?'<span class="ticket-stamp" aria-hidden="true">voice</span>':""}
        ${s.shape==="shape-tag"?'<span class="tag-hole" aria-hidden="true"></span>':""}
        <div class="media">
          <img src="${s.img}" alt="" loading="lazy" />
          ${s.hasVideo?'<div class="play" aria-hidden="true">▶</div>':""}
        </div>
        <div class="body">
          <span class="badge ${s.role}">${s.role==="student"?"Student":"Educator"}</span>
          <div class="place">${s.place} · ${s.region}</div>
          <p class="quote">“${s.q}”</p>
          <div class="by">— ${s.by}</div>
        </div>
      </article>
    </div>`).join("");
  boardSurface.querySelectorAll(".frame-wrap").forEach(wrap=>{
    const open=()=>openModal(+wrap.dataset.id);
    wrap.onclick=open;
    wrap.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); } };
    wrap.setAttribute("tabindex","0");
    wrap.setAttribute("role","button");
    wrap.setAttribute("aria-label","Story from "+filtered.find(x=>x.id===+wrap.dataset.id)?.place);
  });
  if(!gridMode) requestAnimationFrame(fitBoard);
}

function setGridMode(on){
  gridMode=on;
  viewport.classList.toggle("grid-mode",on);
  boardSurface.classList.toggle("grid-layout",on);
  document.getElementById("btnBoard").classList.toggle("active",!on);
  document.getElementById("btnGrid").classList.toggle("active",on);
  if(on){ boardLayer.style.transform=""; boardSurface.style.width=""; boardSurface.style.height=""; }
  renderCards();
}

function applyTransform(){
  boardLayer.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
}
function fitBoard(){
  if(gridMode||!filtered.length) return;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const bw=boardSurface.offsetWidth, bh=boardSurface.offsetHeight;
  if(!vw||!vh||!bw||!bh){ requestAnimationFrame(fitBoard); return; }
  const fit=Math.min(vw/bw,vh/bh);
  scale=Math.max(0.35, Math.min(1.15, fit*0.96));
  panX=(vw-bw*scale)/2;
  panY=Math.max(12,(vh-bh*scale)/2);
  applyTransform();
}

// Pan & zoom (board mode only)
viewport.addEventListener("pointerdown",e=>{
  if(gridMode||e.target.closest(".frame")) return;
  dragging=true; dragX=e.clientX-panX; dragY=e.clientY-panY;
  viewport.classList.add("dragging");
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove",e=>{
  if(!dragging) return;
  panX=e.clientX-dragX; panY=e.clientY-dragY;
  applyTransform();
});
viewport.addEventListener("pointerup",()=>{ dragging=false; viewport.classList.remove("dragging"); });
viewport.addEventListener("wheel",e=>{
  if(gridMode) return;
  e.preventDefault();
  const d=-e.deltaY*0.0012;
  const ns=Math.min(2.2,Math.max(0.35,scale+d));
  const rect=viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(ns/scale);
  panY=my-(my-panY)*(ns/scale);
  scale=ns;
  applyTransform();
},{passive:false});

document.getElementById("btnBoard").onclick=()=>setGridMode(false);
document.getElementById("btnGrid").onclick=()=>setGridMode(true);
document.getElementById("btnFit").onclick=fitBoard;
document.getElementById("btnReset").onclick=fitBoard;
document.getElementById("btnZoomIn").onclick=()=>{ scale=Math.min(2.2,scale+.15); applyTransform(); };
document.getElementById("btnZoomOut").onclick=()=>{ scale=Math.max(0.35,scale-.15); applyTransform(); };

// Region filters
const rWrap=document.getElementById("regionFilters");
REGIONS.forEach(r=>{
  const b=document.createElement("button");
  b.type="button"; b.className="chip"+(r==="All"?" active":"");
  b.textContent=r;
  b.onclick=()=>{
    activeRegion=r;
    rWrap.querySelectorAll(".chip").forEach(c=>c.classList.toggle("active",c===b));
    renderCards();
  };
  rWrap.appendChild(b);
});
document.querySelectorAll("[data-role]").forEach(b=>{
  b.onclick=()=>{
    activeRole=b.dataset.role;
    document.querySelectorAll("[data-role]").forEach(c=>c.classList.toggle("active",c===b));
    renderCards();
  };
});
document.querySelector('[data-role="all"]').classList.add("active");

function youtubeId(url){
  if(!url) return null;
  const m=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m?m[1]:null;
}

// Modal
function openModal(id){
  const s=stories.find(x=>x.id===id); if(!s) return;
  const wrap=document.getElementById("mMediaWrap");
  const vid=document.getElementById("mVideo");
  const yt=youtubeId(s.video);
  if(yt){
    wrap.classList.add("has-video");
    vid.src="https://www.youtube.com/embed/"+yt+"?rel=0";
    document.getElementById("mImg").alt="";
  }else{
    wrap.classList.remove("has-video");
    vid.removeAttribute("src");
    document.getElementById("mImg").src=s.img;
    document.getElementById("mImg").alt=s.cap||"";
  }
  document.getElementById("mRole").textContent=s.role==="student"?"Student voice":"Educator voice";
  document.getElementById("mPlace").textContent=s.place+" · "+s.region;
  document.getElementById("mQ").textContent="“"+s.q+"”";
  document.getElementById("mText").textContent=s.full;
  document.getElementById("mBy").textContent="— "+s.by;
  modal.classList.add("show"); modalBg.classList.add("show");
}
function closeModal(){
  modal.classList.remove("show"); modalBg.classList.remove("show");
  document.getElementById("mVideo").removeAttribute("src");
  document.getElementById("mMediaWrap").classList.remove("has-video");
}
document.getElementById("mClose").onclick=closeModal;
modalBg.onclick=closeModal;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// Background map
if(typeof d3!=="undefined"&&typeof topojson!=="undefined"){
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
    const feats=topojson.feature(world,world.objects.countries).features;
    d3.select("#mapBg").append("g").selectAll("path").data(feats).join("path").attr("d",d3.geoPath(d3.geoNaturalEarth1().scale(178).translate([480,250])));
  });
}

stories=buildStories();
setGridMode(gridMode);
</script>
</body>
