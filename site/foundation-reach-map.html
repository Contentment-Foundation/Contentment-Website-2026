<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foundation Reach — Design Prototype</title>
<style>
  :root {
    --bg:#3f3f78; --map-bg:#4a4a8a;
    --country:#6b6ba3; --country-stroke:#3f3f78;
    --served:#7ec98f; --served-hi:#a5e0b2; --served-dim:#5c8a6a;
    --pin:#8be0a0; --pin-stroke:#ffffff;
    --text:#eef0f8; --muted:#b9bbd6;
    --card:#ffffff; --ink:#2a2a4a;
    --green:#4FA98C; --teal:#1FAFC0;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden; height:100%; }
  #app { display:grid; grid-template-rows:auto auto 1fr; height:100vh; }

  /* proto banner */
  .proto-banner { padding:9px 20px; background:#ffdd57; color:#4a3b00; font-size:12px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; border-bottom:1px solid rgba(0,0,0,.06); }
  .proto-banner a { color:#024E70; font-weight:700; text-decoration:none; white-space:nowrap; }
  .proto-banner a:hover { text-decoration:underline; }

  /* header */
  header { padding:12px 22px; border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .header-label { white-space:nowrap; }
  .header-label h1 { font-size:16px; margin:0 0 1px; letter-spacing:.3px; }
  .header-label p  { font-size:11px; color:var(--muted); margin:0; }
  .filters { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
  .chip { border:1px solid rgba(255,255,255,.22); background:transparent; color:var(--text);
    padding:4px 13px; border-radius:999px; font-size:12px; cursor:pointer; transition:.14s; }
  .chip:hover { background:rgba(255,255,255,.1); }
  .chip.active { background:var(--served); color:#12331e; border-color:var(--served); font-weight:700; }

  /* map */
  #mapWrap { position:relative; background:var(--map-bg); overflow:hidden; }
  svg { display:block; width:100%; height:100%; outline:none; }
  .country { fill:var(--country); stroke:var(--country-stroke); stroke-width:.4px; outline:none; }
  .country:focus         { outline:none; }
  .country:focus-visible { outline:2px solid rgba(255,255,255,.75); outline-offset:2px; }
  .country.served        { fill:var(--served); cursor:pointer; transition:fill .15s; }
  .country.served:hover  { fill:var(--served-hi); }
  .country.active        { fill:var(--served-hi); stroke:#fff; stroke-width:1px; }
  .country.dim           { fill:var(--served-dim); opacity:.45; cursor:default; }
  .pin                   { fill:var(--pin); stroke:var(--pin-stroke); stroke-width:1.4px; cursor:pointer; outline:none; }
  .pin:focus             { outline:none; }
  .pin:focus-visible     { outline:2px solid rgba(255,255,255,.75); outline-offset:3px; }
  .pin-pulse             { fill:var(--pin); opacity:.5; pointer-events:none; }
  .pin-label             { fill:var(--text); font-size:9px; font-weight:700; pointer-events:none;
    text-transform:uppercase; letter-spacing:.5px; }

  .legend { position:absolute; left:16px; bottom:14px; display:flex; gap:16px;
    background:rgba(0,0,0,.25); padding:8px 14px; border-radius:8px; font-size:11px; color:var(--text); }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:3px;
    margin-right:5px; vertical-align:-1px; }

  /* hover tooltip */
  #tip { position:absolute; pointer-events:none; z-index:30; background:#fff; color:var(--ink);
    border-radius:8px; padding:8px 12px; font-size:12px; box-shadow:0 8px 24px rgba(0,0,0,.3);
    opacity:0; transition:opacity .1s; white-space:nowrap; }
  #tip.show { opacity:1; }
  #tip b { color:#2a7d47; }

  /* error banner */
  #banner { display:none; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:#ffdd57; color:#4a3b00; padding:10px 16px; border-radius:8px; font-size:13px;
    z-index:60; max-width:80%; box-shadow:0 6px 20px rgba(0,0,0,.3); }

  /* --- EDUCATOR SPOTLIGHT POPUP --- */
  #backdrop { position:fixed; inset:0; background:rgba(10,10,30,.5); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .18s; }
  #backdrop.show { opacity:1; pointer-events:auto; }

  #popup { position:fixed; z-index:50; width:320px; max-width:90vw;
    background:var(--card); color:var(--ink); border-radius:18px;
    box-shadow:0 28px 64px rgba(0,0,0,.52);
    opacity:0; transform:scale(.94) translateY(10px); pointer-events:none;
    transition:opacity .18s, transform .22s cubic-bezier(.34,1.3,.64,1);
    overflow:hidden; }
  #popup.show { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }

  .pop-close { position:absolute; top:10px; right:10px; z-index:5;
    width:28px; height:28px; border-radius:50%; border:none;
    background:rgba(0,0,0,.42); color:#fff; font-size:16px; line-height:28px;
    text-align:center; cursor:pointer; transition:background .12s; }
  .pop-close:hover { background:rgba(0,0,0,.68); }

  .pop-photo { width:100%; height:210px; object-fit:cover; display:block;
    background:linear-gradient(135deg,#c8d6e2,#9ab5c8); }

  .pop-body { padding:18px 20px 24px; }

  .pop-country { font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.7px; color:var(--green); margin:0 0 10px; }

  .pop-quote { font-style:italic; font-size:15px; line-height:1.55; color:var(--ink);
    margin:0 0 16px; position:relative; padding:0 4px; }
  .pop-quote::before { content:'“'; font-style:normal; font-family:Georgia,serif;
    font-size:32px; line-height:0; vertical-align:-10px; color:var(--green);
    margin-right:2px; opacity:.75; }
  .pop-quote::after  { content:'”'; font-style:normal; font-family:Georgia,serif;
    font-size:32px; line-height:0; vertical-align:-10px; color:var(--green);
    margin-left:2px; opacity:.75; }

  .pop-divider { height:1px; background:rgba(2,78,112,.08); margin:0 0 14px; }

  .pop-by   { font-weight:700; font-size:13.5px; color:var(--ink); margin:0 0 2px; }
  .pop-role { font-size:12px; color:#777; margin:0; line-height:1.4; }

  @media (max-width:540px){
    #popup { width:calc(100vw - 24px); }
    .pop-photo { height:170px; }
  }
  @media (prefers-reduced-motion: reduce){
    #popup, #backdrop { transition:none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="proto-banner" role="status">
    <span><strong>Design prototype</strong> — for team review only. Not part of the live homepage yet.</span>
    <a href="index.html">← Back to homepage</a>
    <a href="story-board.html">Story Board →</a>
  </div>
  <header>
    <div class="header-label">
      <h1>🌱 Foundation Reach</h1>
      <p>Meet the educators behind the work</p>
    </div>
    <div class="filters" id="filters"></div>
  </header>
  <div id="mapWrap">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="legend">
      <span><i style="background:#7ec98f"></i>Program active — click to meet an educator</span>
      <span><i style="background:#6b6ba3"></i>Not yet served</span>
      <span><i style="background:#8be0a0;border-radius:50%"></i>City spotlight</span>
    </div>
    <div id="tip"></div>
    <div id="banner"></div>
  </div>
</div>
<div id="backdrop"></div>
<div id="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="program-data.js"></script>
<script>

const REGIONS = ["All","Americas","Africa","Asia","Europe","Oceania"];
let activeRegion = "All", selected = null;

const svg       = d3.select("#map");
const W = 960, H = 500;
const projection = d3.geoNaturalEarth1().scale(178).translate([W/2, H/2+8]);
const path       = d3.geoPath(projection);
const tip        = document.getElementById("tip");
const mapWrap    = document.getElementById("mapWrap");
const popup      = document.getElementById("popup");
const backdrop   = document.getElementById("backdrop");

const nameOf   = k => PROGRAM[k].label || k;
const inRegion = k => activeRegion === "All" || PROGRAM[k].region === activeRegion;

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function showBanner(msg){ const b=document.getElementById("banner"); b.textContent=msg; b.style.display="block"; }

if(typeof d3==="undefined"||typeof topojson==="undefined"){
  showBanner("Libraries didn't load — this page needs an internet connection (D3 + TopoJSON load from CDN).");
} else if(typeof PROGRAM==="undefined"){
  showBanner("program-data.js didn't load — make sure it's in the same folder as this file.");
}

// Region filter chips
const fWrap = document.getElementById("filters");
REGIONS.forEach(r => {
  const b = document.createElement("button");
  b.className = "chip" + (r === "All" ? " active" : "");
  b.textContent = r;
  b.onclick = () => {
    activeRegion = r;
    [...fWrap.children].forEach(c => c.classList.toggle("active", c === b));
    applyFilter();
  };
  fWrap.appendChild(b);
});

// Draw map
if(typeof d3 !== "undefined" && typeof topojson !== "undefined" && typeof PROGRAM !== "undefined"){
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
    const feats = topojson.feature(world, world.objects.countries).features;
    feats.forEach(f => {
      f.__key = isoToKey[String(f.id)] ||
                (PROGRAM[f.properties && f.properties.name] ? f.properties.name : null);
    });

    svg.append("g").selectAll("path").data(feats).join("path")
      .attr("d", path)
      .attr("class", f => "country" + (f.__key ? " served" : ""))
      .attr("data-key", f => f.__key || "")
      .attr("tabindex",  f => f.__key ? 0 : null)
      .attr("role",      f => f.__key ? "button" : null)
      .attr("aria-label",f => f.__key ? "Meet an educator from " + nameOf(f.__key) : null)
      .on("mousemove",  (e,f) => { if(f.__key && inRegion(f.__key)) quickTip(f.__key, e); })
      .on("mouseleave", hideTip)
      .on("click",      (e,f) => { if(f.__key && inRegion(f.__key)){ openPopup(f.__key, e); e.stopPropagation(); } })
      .on("keydown",    (e,f) => { if(f.__key && inRegion(f.__key) && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); openPopup(f.__key, null); } });

    // City pins
    const pins = svg.append("g").selectAll("g").data(CITIES).join("g")
      .attr("transform", d => `translate(${projection(d.coords)})`);
    const pulse = pins.append("circle").attr("class","pin-pulse").attr("r",4);
    pulse.append("animate").attr("attributeName","r").attr("values","4;12;4").attr("dur","2.4s").attr("repeatCount","indefinite");
    pulse.append("animate").attr("attributeName","opacity").attr("values",".5;0;.5").attr("dur","2.4s").attr("repeatCount","indefinite");
    pins.append("circle").attr("class","pin").attr("r",4)
      .attr("tabindex",0).attr("role","button")
      .attr("aria-label", d => "Meet an educator from " + nameOf(d.key))
      .on("mousemove",  (e,d) => { if(inRegion(d.key)) quickTip(d.key, e); })
      .on("mouseleave", hideTip)
      .on("click",      (e,d) => { if(inRegion(d.key)){ openPopup(d.key, e); e.stopPropagation(); } })
      .on("keydown",    (e,d) => { if(inRegion(d.key) && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); openPopup(d.key, null); } });
    pins.append("text").attr("class","pin-label").attr("x",8).attr("y",3).text(d => d.name);

    applyFilter();
  }).catch(err => showBanner("Could not load map data from CDN: " + err));
}

// Hover tooltip — just country + educator first name
function quickTip(k, e){
  const s = PROGRAM[k].stories && PROGRAM[k].stories[0];
  const firstName = s ? s.by.split(",")[0].trim() : "an educator";
  tip.innerHTML = `<b>${esc(nameOf(k))}</b> — click to meet ${esc(firstName)}`;
  tip.classList.add("show");
  const r = mapWrap.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top  + 14;
  if(x + tip.offsetWidth  > r.width)  x = e.clientX - r.left - tip.offsetWidth  - 14;
  if(y + tip.offsetHeight > r.height) y = e.clientY - r.top  - tip.offsetHeight - 14;
  tip.style.left = x + "px";
  tip.style.top  = y + "px";
}
function hideTip(){ tip.classList.remove("show"); }

function applyFilter(){
  d3.selectAll("path.country")
    .classed("dim",    function(){ const k=this.dataset.key; return k && !inRegion(k); })
    .classed("active", function(){ return this.dataset.key === selected; });
}

// ---------- EDUCATOR SPOTLIGHT POPUP ----------
function openPopup(k, evt){
  selected = k;
  d3.selectAll("path.country").classed("active", function(){ return this.dataset.key === k; });

  const s = PROGRAM[k].stories && PROGRAM[k].stories[0];
  if(!s) return;

  // Split "Maria S., Principal, Ohio" → name + role+location detail
  const parts   = s.by.split(",").map(p => p.trim());
  const byName   = parts[0];
  const byDetail = parts.slice(1).join(", ");

  popup.innerHTML = `
    <button class="pop-close" id="popClose" aria-label="Close">×</button>
    <img class="pop-photo" src="${esc(s.img)}" alt="${esc(s.cap || byName)}" />
    <div class="pop-body">
      <div class="pop-country">${esc(nameOf(k))}</div>
      <p class="pop-quote">${esc(s.q)}</p>
      <div class="pop-divider"></div>
      <div class="pop-by">${esc(byName)}</div>
      ${byDetail ? `<p class="pop-role">${esc(byDetail)}</p>` : ""}
    </div>`;

  document.getElementById("popClose").onclick = closePopup;
  backdrop.classList.add("show");
  popup.classList.add("show");
  positionPopup(evt);
}

function positionPopup(evt){
  const pw = popup.offsetWidth  || 320;
  const ph = popup.offsetHeight || 400;
  const m  = 16;
  let x = evt ? evt.clientX + 18 : window.innerWidth  / 2 - pw / 2;
  let y = evt ? evt.clientY - 40 : window.innerHeight / 2 - ph / 2;
  if(x + pw > window.innerWidth  - m) x = window.innerWidth  - pw - m;
  if(y + ph > window.innerHeight - m) y = window.innerHeight - ph - m;
  if(x < m) x = m;
  if(y < m) y = m;
  popup.style.left = x + "px";
  popup.style.top  = y + "px";
}

function closePopup(){
  selected = null;
  popup.classList.remove("show");
  backdrop.classList.remove("show");
  d3.selectAll("path.country").classed("active", false);
}
backdrop.onclick = closePopup;
document.addEventListener("keydown", e => { if(e.key === "Escape") closePopup(); });

</script>
</body>
</html>
