<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foundation Reach Map — Design Prototype</title>
<style>
  .proto-banner { grid-column:1 / -1; padding:10px 24px; background:#ffdd57; color:#4a3b00;
    font-size:13px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .proto-banner a { color:#024E70; font-weight:700; text-decoration:none; white-space:nowrap; }
  .proto-banner a:hover { text-decoration:underline; }
  :root {
    --bg:#3f3f78; --panel:#33335f; --map-bg:#4a4a8a;
    --country:#6b6ba3; --country-stroke:#3f3f78;
    --served:#7ec98f; --served-hi:#a5e0b2; --served-dim:#5c8a6a;
    --pin:#8be0a0; --pin-stroke:#ffffff;
    --text:#eef0f8; --muted:#b9bbd6; --card:#ffffff; --ink:#2a2a4a; --accent:#2a7d47;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:1fr 320px; grid-template-rows:auto auto 1fr; min-height:100vh; height:100vh; }
  header { grid-column:1 / -1; padding:16px 24px; border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; letter-spacing:.4px; white-space:nowrap; }
  .totals { display:flex; gap:24px; margin-left:auto; }
  .total .n { font-size:22px; font-weight:800; line-height:1; }
  .total .l { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .filters { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { border:1px solid rgba(255,255,255,.25); background:transparent; color:var(--text);
    padding:5px 12px; border-radius:999px; font-size:12px; cursor:pointer; transition:.15s; }
  .chip:hover { background:rgba(255,255,255,.1); }
  .chip.active { background:var(--served); color:#12331e; border-color:var(--served); font-weight:700; }

  #mapWrap { position:relative; background:var(--map-bg); overflow:hidden; }
  svg { display:block; width:100%; height:100%; }
  .country { fill:var(--country); stroke:var(--country-stroke); stroke-width:.4px; }
  .country.served { fill:var(--served); cursor:pointer; transition:fill .15s; }
  .country.served:hover { fill:var(--served-hi); }
  .country.active { fill:var(--served-hi); stroke:#fff; stroke-width:1.1px; }
  .country.dim { fill:var(--served-dim); opacity:.45; cursor:default; }
  .pin { fill:var(--pin); stroke:var(--pin-stroke); stroke-width:1.4px; cursor:pointer; }
  .pin-pulse { fill:var(--pin); opacity:.5; pointer-events:none; }
  .pin-label { fill:var(--text); font-size:9px; font-weight:700; pointer-events:none;
    text-transform:uppercase; letter-spacing:.5px; }
  .legend { position:absolute; left:16px; bottom:14px; display:flex; gap:16px;
    background:rgba(0,0,0,.22); padding:8px 12px; border-radius:8px; font-size:11px; }
  .legend i { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:-1px; }

  #tip { position:absolute; pointer-events:none; z-index:30; background:#fff; color:var(--ink);
    border-radius:8px; padding:8px 10px; font-size:12px; box-shadow:0 8px 24px rgba(0,0,0,.3);
    opacity:0; transition:opacity .1s; white-space:nowrap; }
  #tip.show { opacity:1; }
  #tip b { color:var(--accent); }

  #banner { display:none; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:#ffdd57; color:#4a3b00; padding:10px 16px; border-radius:8px; font-size:13px; z-index:60;
    max-width:80%; box-shadow:0 6px 20px rgba(0,0,0,.3); }

  /* FLOATING POPUP */
  #backdrop { position:fixed; inset:0; background:rgba(20,20,45,.45); z-index:40; opacity:0;
    pointer-events:none; transition:opacity .18s; }
  #backdrop.show { opacity:1; pointer-events:auto; }
  #popup { position:fixed; z-index:50; width:400px; max-width:94vw; max-height:82vh; display:flex; flex-direction:column; overflow:hidden;
    background:var(--card); color:var(--ink); border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,.4);
    opacity:0; transform:scale(.96); pointer-events:none; transition:opacity .16s, transform .16s; }
  #popup.show { opacity:1; transform:scale(1); pointer-events:auto; }
  .pop-close { position:absolute; top:10px; right:10px; z-index:5; width:28px; height:28px; border-radius:50%;
    border:none; background:rgba(0,0,0,.35); color:#fff; font-size:16px; cursor:pointer; }
  .pop-close:hover { background:rgba(0,0,0,.6); }
  .slider { position:relative; flex:none; width:100%; height:180px; background:#222;
    border-radius:14px 14px 0 0; overflow:hidden; }
  .slider img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .35s; }
  .slider img.on { opacity:1; }
  .slider .arw { position:absolute; top:50%; transform:translateY(-50%); z-index:3; width:30px; height:30px;
    border-radius:50%; border:none; cursor:pointer; background:rgba(0,0,0,.45); color:#fff; font-size:16px; }
  .slider .arw:hover { background:rgba(0,0,0,.7); } .slider .arw.l{left:8px;} .slider .arw.r{right:8px;}
  .slider .dots { position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; z-index:3; }
  .slider .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.5); }
  .slider .dot.on { background:#fff; width:16px; border-radius:99px; }
  .slider .cap { position:absolute; left:0; right:0; bottom:0; z-index:2; padding:22px 12px 20px;
    background:linear-gradient(transparent, rgba(0,0,0,.6)); color:#fff; font-size:11.5px; line-height:1.3; }
  .full-link { display:inline-block; margin-top:10px; font-size:12px; font-weight:700; color:var(--accent);
    cursor:pointer; text-decoration:none; }
  .full-link:hover { text-decoration:underline; }

  /* larger "read full story" modal */
  #fullModal { position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
    background:rgba(20,20,45,.6); padding:24px; }
  #fullModal.show { display:flex; }
  #fullModal .fbox { position:relative; background:#fff; color:var(--ink); border-radius:16px; max-width:620px;
    width:100%; max-height:88vh; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 30px 70px rgba(0,0,0,.5); }
  #fullModal .fbox img { width:100%; height:260px; object-fit:cover; flex:none; }
  #fullModal .fcap { padding:8px 26px 0; font-size:12px; color:#999; }
  #fullModal .fbody { padding:16px 26px 26px; overflow-y:auto; }
  #fullModal h3 { margin:0 0 4px; font-size:24px; }
  #fullModal .frole { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#1c6fb8; margin-bottom:12px; }
  #fullModal .fq { font-style:italic; font-size:17px; color:var(--accent); margin-bottom:14px; line-height:1.4; }
  #fullModal .ftext { font-size:14.5px; line-height:1.75; color:#444; }
  #fullModal .fby { margin-top:16px; font-size:12px; color:#888; font-weight:600; }
  #fullModal .fclose { position:absolute; top:14px; right:16px; z-index:5; width:32px; height:32px; border-radius:50%;
    border:none; background:rgba(0,0,0,.45); color:#fff; font-size:18px; cursor:pointer; }
  #fullModal .fclose:hover { background:rgba(0,0,0,.7); }
  .pop-body { flex:1; min-height:0; overflow-y:auto; padding:14px 16px; }
  @media (max-width:640px){
    #popup { width:340px; max-height:86vh; }
    .slider { height:150px; }
  }
  .pop-body h2 { margin:0 0 2px; font-size:18px; }
  .pop-body .region { color:#888; font-size:11px; margin-bottom:10px; }
  .metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
  .metric { background:#f2f3f8; border-radius:8px; padding:7px 4px; text-align:center; }
  .metric .n { font-size:16px; font-weight:800; color:var(--ink); }
  .metric .l { font-size:8px; text-transform:uppercase; letter-spacing:.3px; color:#888; }
  .subhead { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:#999; margin:10px 0 6px; }
  .bar-row { margin-bottom:7px; }
  .bar-row .lab { display:flex; justify-content:space-between; font-size:11px; margin-bottom:3px; color:#444; }
  .bar { height:7px; background:#e7e8ef; border-radius:99px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:linear-gradient(90deg,#7ec98f,#4fae6f); border-radius:99px; width:0; transition:width .6s ease; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:11px; background:#eaf3ec; color:#2a7d47; border:1px solid #bfe0c9; padding:3px 9px; border-radius:999px; }
  .story { background:#f7f8fc; border-radius:8px; padding:10px 12px; margin-top:4px; }
  .role-badge { display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    padding:2px 7px; border-radius:999px; margin-bottom:6px; }
  .role-badge.educator { background:#e3f1ff; color:#1c6fb8; }
  .role-badge.student { background:#eafbe9; color:#2a7d47; }
  .story .q { font-style:italic; font-size:13px; line-height:1.35; margin-bottom:6px; }
  .story .text { font-size:12px; line-height:1.45; color:#555; margin-bottom:6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .story .by { font-size:10.5px; color:#888; font-weight:600; }
  .story-nav { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .story-nav button { background:#e7e8ef; border:none; color:#444; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:15px; }
  .story-nav button:hover { background:#d7d9e6; }
  .story-nav .dots { display:flex; gap:5px; } .story-nav .dot { width:6px; height:6px; border-radius:50%; background:#ccd; }
  .story-nav .dot.on { background:var(--served); }

  #panel { background:var(--panel); border-left:1px solid rgba(255,255,255,.08); overflow-y:auto; padding:18px 18px; }
  .search { width:100%; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); color:var(--text); font-size:13px; margin-bottom:14px; }
  .search::placeholder { color:var(--muted); }
  .list-title { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:4px 0 10px; }
  .clist { list-style:none; margin:0; padding:0; }
  .clist li { display:flex; justify-content:space-between; align-items:center; padding:9px 10px; border-radius:8px;
    cursor:pointer; transition:.12s; font-size:13px; }
  .clist li:hover { background:rgba(255,255,255,.08); }
  .clist li .r { font-size:11px; color:var(--muted); }

  @media (max-width:820px){ #app{ grid-template-columns:1fr; grid-template-rows:auto auto 55vh auto; }
    #panel{ border-left:none; border-top:1px solid rgba(255,255,255,.08);} }
</style>
</head>
<body>
<div id="app">
  <div class="proto-banner" role="status">
    <span><strong>Design prototype</strong> — for team review only. Not part of the live homepage yet.</span>
    <a href="index.html">← Back to homepage</a>
  </div>
  <header>
    <h1>🌱 Foundation Reach</h1>
    <div class="filters" id="filters"></div>
    <div class="totals">
      <div class="total"><div class="n" data-count="0" id="tCountries">0</div><div class="l">Countries</div></div>
      <div class="total"><div class="n" data-count="0" id="tSchools">0</div><div class="l">Schools</div></div>
      <div class="total"><div class="n" data-count="0" id="tEducators">0</div><div class="l">Educators</div></div>
      <div class="total"><div class="n" data-count="0" id="tStudents">0</div><div class="l">Students</div></div>
    </div>
  </header>
  <div id="mapWrap">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="legend">
      <span><i style="background:#7ec98f"></i>Program active</span>
      <span><i style="background:#6b6ba3"></i>Not yet served</span>
      <span><i style="background:#8be0a0;border-radius:50%"></i>City site</span>
    </div>
    <div id="tip"></div>
    <div id="banner"></div>
  </div>
  <aside id="panel"></aside>
</div>
<div id="backdrop"></div>
<div id="popup"></div>
<div id="fullModal"><div class="fbox" id="fbox"></div></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// DATA — each entry has an ISO numeric code (robust match) + display name key.
// ---------------------------------------------------------------------------
const PROGRAM = {
  "United States of America":{iso:"840",region:"Americas",since:2016,schools:142,educators:5100,students:180000,
    impact:{wellbeing:82,attendance:64,teacherRetention:71},programs:["Mindful Classrooms","Educator Well-being","Student Voice"],
    stories:[{q:"The curriculum changed how our whole school handles conflict.",by:"Maria S., Principal, Ohio",role:"educator",
              text:"Before the program, disagreements ended in the office. Now our fifth-graders run their own restorative circles. Suspensions are down 40% this year."},
             {q:"I used to feel like a volcano. Now I know how to breathe first.",by:"Jayden, age 11, Texas",role:"student",
              text:"When I get really mad I do the four-corner breathing my teacher taught us. My little brother uses it too now."}]},
  "Canada":{iso:"124",region:"Americas",since:2018,schools:28,educators:720,students:24000,
    impact:{wellbeing:76,attendance:58,teacherRetention:69},programs:["Mindful Classrooms","Student Voice"],
    stories:[{q:"Students finally have language for what they feel.",by:"Teacher, Toronto",role:"educator"}]},
  "India":{iso:"356",region:"Asia",since:2019,schools:64,educators:2300,students:95000,
    impact:{wellbeing:79,attendance:73,teacherRetention:66},programs:["Mindful Classrooms","Rural Outreach","Educator Well-being"],
    stories:[{q:"Attendance rose sharply after daily check-ins.",by:"Head, Pune",role:"educator",
              text:"We started every morning with a two-minute check-in. Within a term, the children who used to skip class were the ones leading it."},
             {q:"Now I tell my teacher when I feel worried.",by:"Ananya, age 10, Delhi",role:"student"}]},
  "Indonesia":{iso:"360",region:"Asia",since:2021,schools:19,educators:480,students:31000,
    impact:{wellbeing:74,attendance:61,teacherRetention:63},programs:["Mindful Classrooms"],
    stories:[{q:"Our teachers feel supported for the first time.",by:"Coordinator, Jakarta",role:"educator"}]},
  "Saudi Arabia":{iso:"682",region:"Asia",since:2022,schools:11,educators:260,students:14000,
    impact:{wellbeing:70,attendance:55,teacherRetention:60},programs:["Educator Well-being"],
    stories:[{q:"Well-being is now part of every morning.",by:"Educator, Riyadh",role:"educator"}]},
  "Kenya":{iso:"404",region:"Africa",since:2019,schools:22,educators:540,students:38000,
    impact:{wellbeing:81,attendance:70,teacherRetention:64},programs:["Mindful Classrooms","Rural Outreach"],
    stories:[{q:"The children lead the breathing exercises now.",by:"Grace W., Teacher, Nairobi",role:"educator",
              text:"I only had to model the morning check-in for two weeks. Now the students remind me if we skip it. It has become the heartbeat of our classroom."},
             {q:"School feels calm now. I like coming here.",by:"Amani, age 9, Kisumu",role:"student",
              text:"We start the day sitting quietly and saying how we feel. On sad days my teacher notices and we talk. I have more friends this year."}]},
  "Uganda":{iso:"800",region:"Africa",since:2020,schools:14,educators:300,students:21000,
    impact:{wellbeing:77,attendance:66,teacherRetention:61},programs:["Mindful Classrooms"],
    stories:[{q:"Calm classrooms, calmer communities.",by:"Head, Kampala",role:"educator"}]},
  "Tanzania":{iso:"834",region:"Africa",since:2021,schools:12,educators:240,students:17000,
    impact:{wellbeing:75,attendance:62,teacherRetention:59},programs:["Rural Outreach"],
    stories:[{q:"A quiet revolution in how we teach.",by:"Educator, Dodoma",role:"educator"}]},
  "Dem. Rep. Congo":{iso:"180",region:"Africa",since:2022,schools:9,educators:180,students:12000,
    impact:{wellbeing:72,attendance:57,teacherRetention:55},programs:["Rural Outreach"],
    stories:[{q:"Hope, taught daily.",by:"Coordinator, Goma",role:"educator"}]},
  "Bhutan":{iso:"064",region:"Asia",since:2023,schools:6,educators:120,students:5400,
    impact:{wellbeing:85,attendance:78,teacherRetention:74},programs:["Mindful Classrooms","Student Voice"],
    stories:[{q:"Gross National Happiness, in the classroom.",by:"Teacher, Thimphu",role:"educator"}]}
};
const CITIES = [
  { name:"Honolulu", coords:[-157.86,21.31], key:"__Honolulu" },
  { name:"Singapore", coords:[103.82,1.35], key:"__Singapore" }
];
PROGRAM["__Honolulu"]={label:"Honolulu, Hawaiʻi",region:"Americas",since:2017,schools:8,educators:190,students:6200,
  impact:{wellbeing:83,attendance:69,teacherRetention:72},programs:["Mindful Classrooms","Student Voice"],
  stories:[{q:"Aloha as pedagogy.",by:"Educator, Oʻahu",role:"educator"}]};
PROGRAM["__Singapore"]={label:"Singapore",region:"Asia",since:2022,schools:5,educators:130,students:4100,
  impact:{wellbeing:80,attendance:67,teacherRetention:70},programs:["Educator Well-being"],
  stories:[{q:"Small nation, big shift in student well-being.",by:"Principal",role:"educator"}]};

// Placeholder image generator (offline-safe). Set story.img to a real URL/path to use photos.
function ph(label,seed){
  const pals=[["#7ec98f","#3f8a5b"],["#6ea8e0","#2f5f9e"],["#e0b56e","#a5772f"],["#c98fbf","#8a3f7d"],["#8fc9c5","#3f8a84"]];
  const c=pals[Math.abs(seed)%pals.length];
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='640' height='360'>
    <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${c[0]}'/><stop offset='1' stop-color='${c[1]}'/></linearGradient></defs>
    <rect width='640' height='360' fill='url(#g)'/>
    <circle cx='520' cy='70' r='120' fill='rgba(255,255,255,0.12)'/><circle cx='90' cy='300' r='90' fill='rgba(255,255,255,0.10)'/>
    <text x='32' y='326' font-family='sans-serif' font-size='24' font-weight='700' fill='rgba(255,255,255,0.92)'>${label}</text>
    <text x='32' y='298' font-family='sans-serif' font-size='12' fill='rgba(255,255,255,0.7)'>PROGRAM PHOTO · replace via story.img</text></svg>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}
Object.keys(PROGRAM).forEach(k=>{ (PROGRAM[k].stories||[]).forEach((s,i)=>{
  if(!s.role) s.role = i%2 ? "student":"educator";
  if(!s.text) s.text = s.q;
  if(!s.img)  s.img  = ph((PROGRAM[k].label||k)+" · "+(i+1), k.length+i);
  if(!s.cap)  s.cap  = (s.role==="student"?"A student":"An educator")+" at a partner school in "+(PROGRAM[k].label||k);
  if(!s.full) s.full = s.text + " " + s.text; // demo long text; replace with the real full story
}); });
// id -> program key
const isoToKey={}; Object.keys(PROGRAM).forEach(k=>{ if(PROGRAM[k].iso) isoToKey[PROGRAM[k].iso]=k; });

const REGIONS=["All","Americas","Africa","Asia"];
let activeRegion="All", selected=null, storyIdx=0;

const svg=d3.select("#map"), W=960,H=500;
const projection=d3.geoNaturalEarth1().scale(178).translate([W/2,H/2+8]);
const path=d3.geoPath(projection);
const tip=document.getElementById("tip"), mapWrap=document.getElementById("mapWrap");
const panel=document.getElementById("panel"), popup=document.getElementById("popup"), backdrop=document.getElementById("backdrop");
const fmt=n=> n>=1000 ? (n/1000).toFixed(n%1000?1:0)+"k" : n;
const nameOf=k=> PROGRAM[k].label || k;
const inRegion=k=> activeRegion==="All"||PROGRAM[k].region===activeRegion;

if(typeof d3==="undefined"||typeof topojson==="undefined"){
  showBanner("Libraries didn't load — this page needs an internet connection (it pulls D3 and the map from a CDN). Open the file in a normal browser tab while online.");
}
function showBanner(msg){ const b=document.getElementById("banner"); b.textContent=msg; b.style.display="block"; }

// filter chips
const fWrap=document.getElementById("filters");
REGIONS.forEach(r=>{ const b=document.createElement("button"); b.className="chip"+(r==="All"?" active":"");
  b.textContent=r; b.onclick=()=>{activeRegion=r; [...fWrap.children].forEach(c=>c.classList.toggle("active",c===b)); applyFilter(); renderList();};
  fWrap.appendChild(b); });

function animate(el,to){ const start=+el.dataset.count||0,t0=performance.now(),dur=700;
  (function step(t){ const p=Math.min(1,(t-t0)/dur),v=Math.round(start+(to-start)*p);
    el.textContent=fmt(v); if(p<1) requestAnimationFrame(step); else el.dataset.count=to; })(t0); }
function updateTotals(){
  const keys=Object.keys(PROGRAM).filter(inRegion), geo=keys.filter(k=>!k.startsWith("__"));
  const sum=f=>keys.reduce((a,k)=>a+PROGRAM[k][f],0);
  animate(document.getElementById("tCountries"),geo.length);
  animate(document.getElementById("tSchools"),sum("schools"));
  animate(document.getElementById("tEducators"),sum("educators"));
  animate(document.getElementById("tStudents"),sum("students"));
}

if(typeof d3!=="undefined" && typeof topojson!=="undefined"){
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  const feats=topojson.feature(world,world.objects.countries).features;
  // resolve program key by ISO id first, then name
  feats.forEach(f=>{ f.__key = isoToKey[String(f.id)] || (PROGRAM[f.properties&&f.properties.name]?f.properties.name:null); });
  const matched=feats.filter(f=>f.__key).length;
  if(matched===0) showBanner("Map loaded but no countries matched the data keys — check the ISO codes in PROGRAM.");

  svg.append("g").selectAll("path").data(feats).join("path")
    .attr("d",path)
    .attr("class",f=>"country"+(f.__key?" served":""))
    .attr("data-key",f=>f.__key||"")
    .on("mousemove",(e,f)=>{ if(f.__key&&inRegion(f.__key)) quickTip(f.__key,e); })
    .on("mouseleave",hideTip)
    .on("click",(e,f)=>{ if(f.__key&&inRegion(f.__key)){ openPopup(f.__key,e); e.stopPropagation(); } });

  const pins=svg.append("g").selectAll("g").data(CITIES).join("g")
    .attr("transform",d=>`translate(${projection(d.coords)})`);
  const pulse=pins.append("circle").attr("class","pin-pulse").attr("r",4);
  pulse.append("animate").attr("attributeName","r").attr("values","4;12;4").attr("dur","2.4s").attr("repeatCount","indefinite");
  pulse.append("animate").attr("attributeName","opacity").attr("values",".5;0;.5").attr("dur","2.4s").attr("repeatCount","indefinite");
  pins.append("circle").attr("class","pin").attr("r",4)
    .on("mousemove",(e,d)=>{ if(inRegion(d.key)) quickTip(d.key,e); }).on("mouseleave",hideTip)
    .on("click",(e,d)=>{ if(inRegion(d.key)){ openPopup(d.key,e); e.stopPropagation(); } });
  pins.append("text").attr("class","pin-label").attr("x",8).attr("y",3).text(d=>d.name);

  applyFilter(); updateTotals(); renderList();
}).catch(err=>{ showBanner("Could not load map data from CDN: "+err); });
}

// hover tooltip
function quickTip(k,e){ const d=PROGRAM[k];
  tip.innerHTML=`<b>${nameOf(k)}</b> — ${d.schools} schools · ${fmt(d.students)} students · click for details`;
  tip.classList.add("show"); const r=mapWrap.getBoundingClientRect();
  let x=e.clientX-r.left+12,y=e.clientY-r.top+12;
  if(x+tip.offsetWidth>r.width) x=e.clientX-r.left-tip.offsetWidth-12;
  tip.style.left=x+"px"; tip.style.top=y+"px"; }
function hideTip(){ tip.classList.remove("show"); }

function applyFilter(){
  d3.selectAll("path.country").classed("dim",function(){ const k=this.dataset.key; return k && !inRegion(k); })
    .classed("active",function(){ return this.dataset.key===selected; });
  updateTotals();
}

// ---------- FLOATING POPUP ----------
function bar(label,val){ return `<div class="bar-row"><div class="lab"><span>${label}</span><span>${val}%</span></div>
  <div class="bar"><span data-w="${val}"></span></div></div>`; }

function openPopup(k,evt){
  selected=k; storyIdx=0;
  d3.selectAll("path.country").classed("active",function(){ return this.dataset.key===k; });
  const d=PROGRAM[k];
  popup.innerHTML=`<button class="pop-close" id="popClose">×</button>
    <div class="slider" id="slider"></div>
    <div class="pop-body">
      <h2>${nameOf(k)}</h2>
      <div class="region">${d.region} · active since ${d.since}</div>
      <div class="metrics">
        <div class="metric"><div class="n">${d.schools}</div><div class="l">Schools</div></div>
        <div class="metric"><div class="n">${fmt(d.educators)}</div><div class="l">Educators</div></div>
        <div class="metric"><div class="n">${fmt(d.students)}</div><div class="l">Students</div></div>
      </div>
      <div class="subhead">Measured impact</div>
      ${bar("Student well-being improved",d.impact.wellbeing)}
      ${bar("Attendance up",d.impact.attendance)}
      ${bar("Teacher retention",d.impact.teacherRetention)}
      <div class="subhead">Programs running</div>
      <div class="tags">${d.programs.map(p=>`<span class="tag">${p}</span>`).join("")}</div>
      <div class="subhead">Voices from the ground</div>
      <div id="storyBox"></div>
    </div>`;
  document.getElementById("popClose").onclick=closePopup;
  backdrop.classList.add("show"); popup.classList.add("show");
  positionPopup(evt);
  requestAnimationFrame(()=>popup.querySelectorAll(".bar > span").forEach(s=>s.style.width=s.dataset.w+"%"));
  renderStory(k);
  startAuto(k);
  renderList();
}
function positionPopup(evt){
  const pw=popup.offsetWidth||340, phh=popup.offsetHeight||500, m=12;
  let x=(evt?evt.clientX:window.innerWidth/2)+16, y=(evt?evt.clientY:window.innerHeight/2)-40;
  if(x+pw>window.innerWidth-m) x=window.innerWidth-pw-m;
  if(x<m) x=m;
  if(y+phh>window.innerHeight-m) y=window.innerHeight-phh-m;
  if(y<m) y=m;
  popup.style.left=x+"px"; popup.style.top=y+"px";
}
function closePopup(){ selected=null; stopAuto(); popup.classList.remove("show"); backdrop.classList.remove("show");
  d3.selectAll("path.country").classed("active",false); renderList(); }
backdrop.onclick=closePopup;
document.addEventListener("keydown",e=>{ if(e.key!=="Escape") return;
  if(fullModal.classList.contains("show")) closeFull(); else closePopup(); });

function renderStory(k){
  const s=PROGRAM[k].stories, box=document.getElementById("storyBox"); if(!box||!s||!s.length) return;
  const idx=storyIdx%s.length, cur=s[idx];
  const rc=cur.role==="student"?"student":"educator", rl=cur.role==="student"?"Shared by a student":"Shared by an educator";
  document.getElementById("slider").innerHTML=
    s.map((st,i)=>`<img class="${i===idx?'on':''}" src="${st.img}" alt="Story ${i+1}">`).join("")+
    `<div class="cap">${cur.cap}</div>`+
    (s.length>1?`<button class="arw l" id="sPv">‹</button><button class="arw r" id="sNx">›</button>
      <div class="dots">${s.map((_,i)=>`<span class="dot ${i===idx?'on':''}"></span>`).join("")}</div>`:"");
  box.innerHTML=`<div class="story">
    <span class="role-badge ${rc}">${rl}</span>
    <div class="q">“${cur.q}”</div><div class="text">${cur.text}</div><div class="by">— ${cur.by}</div>
    <a class="full-link" id="fullLink">Read full story →</a></div>`;
  document.getElementById("fullLink").onclick=()=>openFull(k,idx);
  if(s.length>1){ document.getElementById("sPv").onclick=()=>{storyIdx=(idx-1+s.length)%s.length; renderStory(k);};
    document.getElementById("sNx").onclick=()=>{storyIdx=(idx+1)%s.length; renderStory(k);}; }
}

// ---------- SLIDER AUTOPLAY ----------
let autoTimer=null, autoPaused=false;
function startAuto(k){ stopAuto();
  const s=PROGRAM[k].stories; if(!s||s.length<2) return;
  autoTimer=setInterval(()=>{ if(!autoPaused && popup.classList.contains("show")){
    storyIdx=(storyIdx+1)%s.length; renderStory(k); } }, 4500);
}
function stopAuto(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } }
popup.addEventListener("mouseenter",()=>autoPaused=true);
popup.addEventListener("mouseleave",()=>autoPaused=false);

// ---------- READ-FULL-STORY MODAL ----------
const fullModal=document.getElementById("fullModal"), fbox=document.getElementById("fbox");
function openFull(k,idx){
  const cur=PROGRAM[k].stories[idx];
  const rl=cur.role==="student"?"Shared by a student":"Shared by an educator";
  fbox.innerHTML=`<button class="fclose" id="fClose">×</button>
    <img src="${cur.img}" alt="Story photo">
    <div class="fcap">${cur.cap}</div>
    <div class="fbody">
      <div class="frole">${rl} · ${nameOf(k)}</div>
      <div class="fq">“${cur.q}”</div>
      <div class="ftext">${cur.full}</div>
      <div class="fby">— ${cur.by}</div>
    </div>`;
  document.getElementById("fClose").onclick=closeFull;
  fullModal.classList.add("show"); autoPaused=true;
}
function closeFull(){ fullModal.classList.remove("show"); autoPaused=false; }
fullModal.addEventListener("click",e=>{ if(e.target===fullModal) closeFull(); });

// ---------- SIDE LIST ----------
panel.innerHTML=`<input class="search" id="search" placeholder="Search countries…" />
  <div class="list-title" id="listTitle">Where we work</div><ul class="clist" id="clist"></ul>`;
document.getElementById("search").addEventListener("input",renderList);
function renderList(){
  const list=document.getElementById("clist"); if(!list) return;
  document.getElementById("listTitle").textContent="Where we work"+(activeRegion!=="All"?" · "+activeRegion:"");
  const q=(document.getElementById("search").value||"").toLowerCase();
  const keys=Object.keys(PROGRAM).filter(inRegion).filter(k=>nameOf(k).toLowerCase().includes(q))
    .sort((a,b)=>PROGRAM[b].students-PROGRAM[a].students);
  list.innerHTML=keys.map(k=>`<li data-k="${k}" style="${k===selected?'background:var(--served);color:#12331e;font-weight:700':''}">
    <span>${nameOf(k)}</span><span class="r" style="${k===selected?'color:#1c5230':''}">${PROGRAM[k].schools} schools</span></li>`).join("");
  [...list.children].forEach(li=>{
    li.onmouseenter=()=>d3.selectAll("path.country").filter(function(){return this.dataset.key===li.dataset.k;}).classed("active",true);
    li.onmouseleave=()=>d3.selectAll("path.country").filter(function(){return this.dataset.key===li.dataset.k;}).classed("active",li.dataset.k===selected);
    li.onclick=()=>openPopup(li.dataset.k,null);
  });
}
</script>
</body>
