<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foundation Reach Map — Design Prototype</title>
<style>
  .proto-banner { grid-column:1 / -1; padding:10px 24px; background:#ffdd57; color:#4a3b00;
    font-size:13px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .proto-banner a { color:#024E70; font-weight:700; text-decoration:none; white-space:nowrap; }
  .proto-banner a:hover { text-decoration:underline; }
  :root {
    --bg:#3f3f78; --panel:#33335f; --map-bg:#4a4a8a;
    --country:#6b6ba3; --country-stroke:#3f3f78;
    --served:#7ec98f; --served-hi:#a5e0b2; --served-dim:#5c8a6a;
    --pin:#8be0a0; --pin-stroke:#ffffff;
    --text:#eef0f8; --muted:#b9bbd6; --card:#ffffff; --ink:#2a2a4a; --accent:#2a7d47;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:1fr 320px; grid-template-rows:auto auto 1fr; min-height:100vh; height:100vh;
    transition:grid-template-columns .35s cubic-bezier(.4,0,.2,1); }
  #app.panel-collapsed { grid-template-columns:1fr 0px; }
  header { grid-column:1 / -1; padding:16px 24px; border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; letter-spacing:.4px; white-space:nowrap; }
  .totals { display:flex; gap:24px; margin-left:auto; }
  .total .n { font-size:22px; font-weight:800; line-height:1; }
  .total .l { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .filters { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { border:1px solid rgba(255,255,255,.25); background:transparent; color:var(--text);
    padding:5px 12px; border-radius:999px; font-size:12px; cursor:pointer; transition:.15s; }
  .chip:hover { background:rgba(255,255,255,.1); }
  .chip.active { background:var(--served); color:#12331e; border-color:var(--served); font-weight:700; }

  #mapWrap { position:relative; background:var(--map-bg); overflow:hidden; }
  svg { display:block; width:100%; height:100%; }
  .country { fill:var(--country); stroke:var(--country-stroke); stroke-width:.4px; }
  .country.served { fill:var(--served); cursor:pointer; transition:fill .15s; }
  .country.served:hover { fill:var(--served-hi); }
  .country.active { fill:var(--served-hi); stroke:#fff; stroke-width:1.1px; }
  .country.dim { fill:var(--served-dim); opacity:.45; cursor:default; }
  .pin { fill:var(--pin); stroke:var(--pin-stroke); stroke-width:1.4px; cursor:pointer; }
  .pin-pulse { fill:var(--pin); opacity:.5; pointer-events:none; }
  .pin-label { fill:var(--text); font-size:9px; font-weight:700; pointer-events:none;
    text-transform:uppercase; letter-spacing:.5px; }
  .legend { position:absolute; left:16px; bottom:14px; display:flex; gap:16px;
    background:rgba(0,0,0,.22); padding:8px 12px; border-radius:8px; font-size:11px; }
  .legend i { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:-1px; }

  #tip { position:absolute; pointer-events:none; z-index:30; background:#fff; color:var(--ink);
    border-radius:8px; padding:8px 10px; font-size:12px; box-shadow:0 8px 24px rgba(0,0,0,.3);
    opacity:0; transition:opacity .1s; white-space:nowrap; }
  #tip.show { opacity:1; }
  #tip b { color:var(--accent); }

  #banner { display:none; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:#ffdd57; color:#4a3b00; padding:10px 16px; border-radius:8px; font-size:13px; z-index:60;
    max-width:80%; box-shadow:0 6px 20px rgba(0,0,0,.3); }

  /* FLOATING POPUP */
  #backdrop { position:fixed; inset:0; background:rgba(20,20,45,.45); z-index:40; opacity:0;
    pointer-events:none; transition:opacity .18s; }
  #backdrop.show { opacity:1; pointer-events:auto; }
  #popup { position:fixed; z-index:50; width:400px; max-width:94vw; max-height:82vh; overflow:hidden;
    background:var(--card); color:var(--ink); border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,.4);
    opacity:0; transform:scale(.96); pointer-events:none;
    transition:opacity .16s, transform .16s, width .38s cubic-bezier(.4,0,.2,1); }
  #popup.show { opacity:1; transform:scale(1); pointer-events:auto; }
  #popup.expanded { width:760px; }
  .pop-shell { display:flex; height:100%; max-height:82vh; }
  .pop-main { position:relative; flex:0 0 400px; width:400px; display:flex; flex-direction:column; min-width:0;
    max-height:82vh; overflow:hidden; }
  .pop-full { flex:0 0 0; width:0; overflow:hidden; background:#fafbfd;
    border-left:1px solid transparent; transition:flex-basis .38s cubic-bezier(.4,0,.2,1),
    width .38s cubic-bezier(.4,0,.2,1), border-color .38s; }
  #popup.expanded .pop-full { flex:0 0 360px; width:360px; border-left-color:#e7e8ef; }
  .pop-full-inner { width:360px; height:100%; max-height:82vh; display:flex; flex-direction:column;
    transform:translateX(24px); opacity:0; transition:transform .38s cubic-bezier(.4,0,.2,1), opacity .28s ease; }
  #popup.expanded .pop-full-inner { transform:translateX(0); opacity:1; }
  .pop-close { position:absolute; top:10px; right:10px; z-index:5; width:28px; height:28px; border-radius:50%;
    border:none; background:rgba(0,0,0,.35); color:#fff; font-size:16px; cursor:pointer; }
  .pop-close:hover { background:rgba(0,0,0,.6); }
  .full-back { align-self:flex-start; margin:12px 12px 0; width:28px; height:28px; border-radius:50%;
    border:none; background:#e7e8ef; color:#444; font-size:16px; cursor:pointer; flex:none; }
  .full-back:hover { background:#d7d9e6; }
  .full-body { flex:1; min-height:0; overflow-y:auto; padding:8px 18px 18px; }
  .full-body .frole { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    color:#1c6fb8; margin-bottom:10px; }
  .full-body .fq { font-style:italic; font-size:16px; color:var(--accent); margin-bottom:12px; line-height:1.4; }
  .full-body .ftext { font-size:14px; line-height:1.75; color:#444; }
  .full-body .fby { margin-top:14px; font-size:12px; color:#888; font-weight:600; }
  .slider { position:relative; flex:none; width:100%; height:180px; background:#222;
    border-radius:14px 14px 0 0; overflow:hidden; }
  .slider img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .35s; }
  .slider img.on { opacity:1; }
  .slider .arw { position:absolute; top:50%; transform:translateY(-50%); z-index:3; width:30px; height:30px;
    border-radius:50%; border:none; cursor:pointer; background:rgba(0,0,0,.45); color:#fff; font-size:16px; }
  .slider .arw:hover { background:rgba(0,0,0,.7); } .slider .arw.l{left:8px;} .slider .arw.r{right:8px;}
  .slider .dots { position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; z-index:3; }
  .slider .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.5); }
  .slider .dot.on { background:#fff; width:16px; border-radius:99px; }
  .slider .cap { position:absolute; left:0; right:0; bottom:0; z-index:2; padding:22px 12px 20px;
    background:linear-gradient(transparent, rgba(0,0,0,.6)); color:#fff; font-size:11.5px; line-height:1.3; }
  .full-link { display:inline-block; margin-top:10px; font-size:12px; font-weight:700; color:var(--accent);
    cursor:pointer; text-decoration:none; }
  .full-link:hover { text-decoration:underline; }

  .pop-body { flex:1; min-height:0; overflow-y:auto; padding:14px 16px; }
  @media (max-width:640px){
    #popup { width:340px; }
    #popup.expanded { width:min(94vw, 620px); }
    .pop-main { flex:0 0 340px; width:340px; }
    #popup.expanded .pop-full { flex:0 0 280px; width:280px; }
    .pop-full-inner { width:280px; }
    .slider { height:150px; }
  }
  @media (prefers-reduced-motion: reduce){
    #popup, .pop-full, .pop-full-inner { transition:none !important; }
  }
  .pop-body h2 { margin:0 0 2px; font-size:18px; }
  .pop-body .region { color:#888; font-size:11px; margin-bottom:10px; }
  .metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
  .metric { background:#f2f3f8; border-radius:8px; padding:7px 4px; text-align:center; }
  .metric .n { font-size:16px; font-weight:800; color:var(--ink); }
  .metric .l { font-size:8px; text-transform:uppercase; letter-spacing:.3px; color:#888; }
  .subhead { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:#999; margin:10px 0 6px; }
  .bar-row { margin-bottom:7px; }
  .bar-row .lab { display:flex; justify-content:space-between; font-size:11px; margin-bottom:3px; color:#444; }
  .bar { height:7px; background:#e7e8ef; border-radius:99px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:linear-gradient(90deg,#7ec98f,#4fae6f); border-radius:99px; width:0; transition:width .6s ease; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:11px; background:#eaf3ec; color:#2a7d47; border:1px solid #bfe0c9; padding:3px 9px; border-radius:999px; }
  .story { background:#f7f8fc; border-radius:8px; padding:10px 12px; margin-top:4px; }
  .role-badge { display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    padding:2px 7px; border-radius:999px; margin-bottom:6px; }
  .role-badge.educator { background:#e3f1ff; color:#1c6fb8; }
  .role-badge.student { background:#eafbe9; color:#2a7d47; }
  .story .q { font-style:italic; font-size:13px; line-height:1.35; margin-bottom:6px; }
  .story .text { font-size:12px; line-height:1.45; color:#555; margin-bottom:6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .story .by { font-size:10.5px; color:#888; font-weight:600; }
  .story-nav { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .story-nav button { background:#e7e8ef; border:none; color:#444; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:15px; }
  .story-nav button:hover { background:#d7d9e6; }
  .story-nav .dots { display:flex; gap:5px; } .story-nav .dot { width:6px; height:6px; border-radius:50%; background:#ccd; }
  .story-nav .dot.on { background:var(--served); }

  #panel { background:var(--panel); border-left:1px solid rgba(255,255,255,.08); overflow-x:hidden; overflow-y:auto;
    padding:18px 18px; min-width:0; opacity:1; transition:opacity .25s ease, padding .35s ease; }
  #app.panel-collapsed #panel { opacity:0; padding:0; pointer-events:none; overflow:hidden; }
  .panel-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .panel-head .list-title { margin:0; flex:1; }
  .panel-collapse { flex:none; width:28px; height:28px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.08); color:var(--text); font-size:16px; line-height:1; cursor:pointer; }
  .panel-collapse:hover { background:rgba(255,255,255,.16); }
  .panel-tab { position:absolute; right:0; top:50%; transform:translateY(-50%); z-index:25;
    display:none; align-items:center; gap:6px; padding:10px 8px 10px 10px; border:none;
    border-radius:10px 0 0 10px; background:var(--panel); color:var(--text); font-size:12px; font-weight:700;
    cursor:pointer; box-shadow:-4px 0 16px rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.12); border-right:none; }
  .panel-tab:hover { background:#3d3d72; }
  .panel-tab .tab-icon { font-size:16px; line-height:1; }
  #app.panel-collapsed .panel-tab { display:flex; }
  .search { width:100%; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); color:var(--text); font-size:13px; margin-bottom:14px; }
  .search::placeholder { color:var(--muted); }
  .list-title { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:4px 0 10px; }
  .clist { list-style:none; margin:0; padding:0; }
  .clist li { display:flex; justify-content:space-between; align-items:center; padding:9px 10px; border-radius:8px;
    cursor:pointer; transition:.12s; font-size:13px; }
  .clist li:hover { background:rgba(255,255,255,.08); }
  .clist li .r { font-size:11px; color:var(--muted); }

  @media (max-width:820px){ #app{ grid-template-columns:1fr; grid-template-rows:auto auto 55vh auto; }
    #app.panel-collapsed { grid-template-rows:auto auto 1fr 0fr; }
    #panel{ border-left:none; border-top:1px solid rgba(255,255,255,.08); overflow-y:auto; }
    #app.panel-collapsed #panel { max-height:0; border-top-color:transparent; }
    .panel-tab { top:auto; bottom:16px; transform:none; border-radius:10px 10px 0 0; right:16px;
      border:1px solid rgba(255,255,255,.12); border-bottom:none; padding:8px 14px; }
  }
  @media (prefers-reduced-motion: reduce){
    #app, #panel { transition:none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="proto-banner" role="status">
    <span><strong>Design prototype</strong> — for team review only. Not part of the live homepage yet.</span>
    <a href="index.html">← Back to homepage</a>
  </div>
  <header>
    <h1>🌱 Foundation Reach</h1>
    <div class="filters" id="filters"></div>
    <div class="totals">
      <div class="total"><div class="n" data-count="0" id="tCountries">0</div><div class="l">Countries</div></div>
      <div class="total"><div class="n" data-count="0" id="tSchools">0</div><div class="l">Schools</div></div>
      <div class="total"><div class="n" data-count="0" id="tEducators">0</div><div class="l">Educators</div></div>
      <div class="total"><div class="n" data-count="0" id="tStudents">0</div><div class="l">Students</div></div>
    </div>
  </header>
  <div id="mapWrap">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="legend">
      <span><i style="background:#7ec98f"></i>Program active</span>
      <span><i style="background:#6b6ba3"></i>Not yet served</span>
      <span><i style="background:#8be0a0;border-radius:50%"></i>City site</span>
    </div>
    <div id="tip"></div>
    <div id="banner"></div>
    <button type="button" class="panel-tab" id="panelTab" aria-controls="panel" aria-expanded="false" title="Show country list">
      <span class="tab-icon" aria-hidden="true">‹</span><span>Countries</span>
    </button>
  </div>
  <aside id="panel" aria-label="Country list"></aside>
</div>
<div id="backdrop"></div>
<div id="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// DATA — each entry has an ISO numeric code (robust match) + display name key.
// ---------------------------------------------------------------------------
const PROGRAM = {
  "United States of America":{iso:"840",region:"Americas",since:2016,schools:142,educators:5100,students:180000,
    impact:{wellbeing:82,attendance:64,teacherRetention:71},programs:["Mindful Classrooms","Educator Well-being","Student Voice"],
    stories:[
      {q:"The curriculum changed how our whole school handles conflict.",by:"Maria S., Principal, Ohio",role:"educator",
       text:"Before the program, disagreements ended in the office. Now our fifth-graders run their own restorative circles. Suspensions are down 40% this year.",
       full:"Before the program, every disagreement seemed to end in my office. Teachers were exhausted from mediating, and students didn't feel heard. We piloted Mindful Classrooms in two grade levels first. Within six months, fifth-graders were running restorative circles on their own. Suspensions dropped 40% year over year, and staff surveys show educators feel more equipped — and less alone — when hard moments arise."},
      {q:"I used to feel like a volcano. Now I know how to breathe first.",by:"Jayden, age 11, Texas",role:"student",
       text:"When I get really mad I do the four-corner breathing my teacher taught us. My little brother uses it too now.",
       full:"I used to get sent out of class a lot because I'd blow up before I could explain what was wrong. My teacher taught us four-corner breathing and a feelings check-in every morning. Now when I'm mad I pause, breathe, and write down what happened. My little brother started copying me at home. School feels safer because people listen before they yell."},
      {q:"Parents notice the difference at home too.",by:"Denise R., Parent & PTA lead, Atlanta",role:"educator",
       text:"Kids are naming emotions at the dinner table. That never happened before.",
       full:"Our PTA was skeptical at first — another program, another binder. But within a semester, parents started reporting the same language at home: 'I need a reset,' 'I'm in the red zone.' Teachers finally have a shared vocabulary with families. Attendance at parent nights went up because people see real change, not just posters on a wall."}
    ]},
  "Canada":{iso:"124",region:"Americas",since:2018,schools:28,educators:720,students:24000,
    impact:{wellbeing:76,attendance:58,teacherRetention:69},programs:["Mindful Classrooms","Student Voice"],
    stories:[
      {q:"Students finally have language for what they feel.",by:"Amira K., Teacher, Toronto",role:"educator",
       text:"We went from 'I'm fine' to honest check-ins in under a month.",
       full:"In a class of 28, almost everyone used to answer 'I'm fine' during morning meetings. We introduced a simple mood meter and paired it with student voice circles once a week. Students began naming anxiety before tests, loneliness at recess, pride after group work. Referrals didn't disappear overnight, but the quality of conversations changed completely — we intervene earlier now."},
      {q:"I spoke at our school assembly about worry.",by:"Leo, age 13, Vancouver",role:"student",
       text:"I told everyone that feeling nervous is normal. A lot of kids came up to me after.",
       full:"I always thought I was the only one who got nervous before presentations. Our teacher asked if anyone wanted to share how they handle worry. I volunteered and talked about journaling and walking outside at lunch. After assembly, kids I barely knew said they felt the same way. It made the school feel smaller in a good way."}
    ]},
  "Mexico":{iso:"484",region:"Americas",since:2020,schools:17,educators:410,students:28500,
    impact:{wellbeing:73,attendance:60,teacherRetention:62},programs:["Mindful Classrooms","Rural Outreach"],
    stories:[
      {q:"Rural schools finally have the same tools as the city.",by:"Carlos M., Coordinator, Oaxaca",role:"educator",
       text:"Distance used to mean isolation. Now our facilitators connect weekly.",
       full:"Our rural cohorts used to receive materials once a year and then figure it out alone. We built a lightweight facilitator network with weekly virtual check-ins and peer observation visits. Teachers swap lesson adaptations for multigrade classrooms, and student well-being data is tracked consistently for the first time across the region."},
      {q:"I help my classmates when they feel sad.",by:"Sofía, age 10, Guadalajara",role:"student",
       text:"We have a peace corner in our classroom. I sit with friends there.",
       full:"When someone is crying we don't laugh anymore. We walk them to the peace corner, get water, and ask if they want to talk or just breathe. I like being a helper. My teacher says I'm a 'calm leader,' which makes me proud."}
    ]},
  "Brazil":{iso:"076",region:"Americas",since:2021,schools:13,educators:340,students:22000,
    impact:{wellbeing:71,attendance:57,teacherRetention:58},programs:["Educator Well-being","Student Voice"],
    stories:[
      {q:"Teacher burnout was our hidden crisis.",by:"Fernanda L., School lead, São Paulo",role:"educator",
       text:"We started with staff well-being before pushing another student initiative.",
       full:"We had tried student programs before, but exhausted teachers couldn't sustain them. Educator Well-being sessions gave staff protected time, peer coaching, and clear boundaries around workload. Only then did classroom practices stick. Retention improved and classroom climate scores followed six months later."}
    ]},
  "India":{iso:"356",region:"Asia",since:2019,schools:64,educators:2300,students:95000,
    impact:{wellbeing:79,attendance:73,teacherRetention:66},programs:["Mindful Classrooms","Rural Outreach","Educator Well-being"],
    stories:[
      {q:"Attendance rose sharply after daily check-ins.",by:"Priya N., Head teacher, Pune",role:"educator",
       text:"We started every morning with a two-minute check-in. Within a term, the children who used to skip class were the ones leading it.",
       full:"Chronic absenteeism was tied to shame — students fell behind and stopped coming. A two-minute morning check-in lowered the stakes: name your mood, set one intention. Within one term, several previously disengaged students volunteered to lead the ritual. Attendance climbed and so did participation in afternoon clubs."},
      {q:"Now I tell my teacher when I feel worried.",by:"Ananya, age 10, Delhi",role:"student",
       text:"Before, I kept everything inside. Now I raise my hand.",
       full:"I used to get stomach aches and wouldn't say why. We learned that worry can live in your body. Now I put a card on my desk — green, yellow, or red — and my teacher checks in privately. I don't miss as much school because someone notices early."},
      {q:"Our village school finally feels connected.",by:"Ravi S., Facilitator, Rajasthan",role:"educator",
       text:"Rural outreach brought mentors who understand our context.",
       full:"Urban training models rarely fit our classrooms — different languages, multigrade rooms, seasonal migration. The Rural Outreach track paired us with mentors who adapted tools instead of copying them. Parents trust the program because facilitators visit homes and listen before prescribing solutions."}
    ]},
  "Indonesia":{iso:"360",region:"Asia",since:2021,schools:19,educators:480,students:31000,
    impact:{wellbeing:74,attendance:61,teacherRetention:63},programs:["Mindful Classrooms"],
    stories:[
      {q:"Our teachers feel supported for the first time.",by:"Dewi A., Coordinator, Jakarta",role:"educator",
       text:"Peer learning circles changed staff culture in one semester.",
       full:"Teachers were isolated in their own classrooms, comparing themselves silently on social media. Monthly peer circles — structured, confidential, practical — normalized struggle and shared wins. Sick days dropped, collaboration increased, and students noticed calmer adults in the building."},
      {q:"We made a calm-down playlist for our class.",by:"Bima, age 12, Surabaya",role:"student",
       text:"Everyone added one song that helps them feel steady.",
       full:"Our class made a playlist together — gamelan, pop, even one teacher's acoustic track. When the room gets loud, we play it for two minutes and reset. It sounds small, but it gave us ownership over our environment instead of just being told to be quiet."}
    ]},
  "Philippines":{iso:"608",region:"Asia",since:2022,schools:15,educators:390,students:26500,
    impact:{wellbeing:75,attendance:63,teacherRetention:61},programs:["Mindful Classrooms","Rural Outreach"],
    stories:[
      {q:"After the typhoon, school became our anchor again.",by:"Elena V., Principal, Cebu",role:"educator",
       text:"Routines for well-being helped students process trauma without forcing them to talk.",

function ph(label,seed){
  const pals=[["#7ec98f","#3f8a5b"],["#6ea8e0","#2f5f9e"],["#e0b56e","#a5772f"],["#c98fbf","#8a3f7d"],["#8fc9c5","#3f8a84"]];
  const c=pals[Math.abs(seed)%pals.length];
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='640' height='360'>
    <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${c[0]}'/><stop offset='1' stop-color='${c[1]}'/></linearGradient></defs>
    <rect width='640' height='360' fill='url(#g)'/>
    <circle cx='520' cy='70' r='120' fill='rgba(255,255,255,0.12)'/><circle cx='90' cy='300' r='90' fill='rgba(255,255,255,0.10)'/>
    <text x='32' y='326' font-family='sans-serif' font-size='24' font-weight='700' fill='rgba(255,255,255,0.92)'>${label}</text>
    <text x='32' y='298' font-family='sans-serif' font-size='12' fill='rgba(255,255,255,0.7)'>PROGRAM PHOTO · replace via story.img</text></svg>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}

function animate(el,to){ const start=+el.dataset.count||0,t0=performance.now(),dur=700;
  (function step(t){ const p=Math.min(1,(t-t0)/dur),v=Math.round(start+(to-start)*p);
    el.textContent=fmt(v); if(p<1) requestAnimationFrame(step); else el.dataset.count=to; })(t0); }
function updateTotals(){
  const keys=Object.keys(PROGRAM).filter(inRegion), geo=keys.filter(k=>!k.startsWith("__"));
  const sum=f=>keys.reduce((a,k)=>a+PROGRAM[k][f],0);
  animate(document.getElementById("tCountries"),geo.length);
  animate(document.getElementById("tSchools"),sum("schools"));
  animate(document.getElementById("tEducators"),sum("educators"));
  animate(document.getElementById("tStudents"),sum("students"));
}

  pulse.append("animate").attr("attributeName","opacity").attr("values",".5;0;.5").attr("dur","2.4s").attr("repeatCount","indefinite");
  pins.append("circle").attr("class","pin").attr("r",4)
    .on("mousemove",(e,d)=>{ if(inRegion(d.key)) quickTip(d.key,e); }).on("mouseleave",hideTip)
    .on("click",(e,d)=>{ if(inRegion(d.key)){ openPopup(d.key,e); e.stopPropagation(); } });
  pins.append("text").attr("class","pin-label").attr("x",8).attr("y",3).text(d=>d.name);

  applyFilter(); updateTotals(); renderList();
}).catch(err=>{ showBanner("Could not load map data from CDN: "+err); });

      </div>

  </div>`;
  document.getElementById("popClose").onclick=closePopup;
  backdrop.classList.add("show"); popup.classList.add("show");
  renderStory(k);
  // Measure & clamp AFTER content is in so the popup's real height is known —
  // otherwise a taller-than-expected popup near the bottom edge gets clipped.
  positionPopup(evt);
  requestAnimationFrame(()=>{
    popup.querySelectorAll(".bar > span").forEach(s=>s.style.width=s.dataset.w+"%");
    keepInView();
  });

function popupWidth(){
  const narrow=window.innerWidth<=640;
  const main=narrow?340:400;
  const full=popup.classList.contains("expanded")?(narrow?280:360):0;
  return main+full;
}
function positionPopup(evt){
  const pw=popupWidth(), phh=popup.offsetHeight||500, m=12;
  let x=(evt?evt.clientX:window.innerWidth/2)+16, y=(evt?evt.clientY:window.innerHeight/2)-40;
  if(x+pw>window.innerWidth-m) x=window.innerWidth-pw-m;
  if(x<m) x=m;
  if(y+phh>window.innerHeight-m) y=window.innerHeight-phh-m;
  if(y<m) y=m;
  popup.style.left=x+"px"; popup.style.top=y+"px";
}
// Keep the popup anchored where it opened; only nudge it left/up if the
// wider (expanded) popup would spill past the viewport edge.
function keepInView(){
  const pw=popupWidth(), phh=popup.offsetHeight||500, m=12;
  let x=parseFloat(popup.style.left)||0, y=parseFloat(popup.style.top)||0;
  if(x+pw>window.innerWidth-m) x=window.innerWidth-pw-m;
  if(x<m) x=m;
  if(y+phh>window.innerHeight-m) y=window.innerHeight-phh-m;
  if(y<m) y=m;
  popup.style.left=x+"px"; popup.style.top=y+"px";
}
function closePopup(){ selected=null; fullOpen=false; stopAuto();
  popup.classList.remove("show","expanded"); backdrop.classList.remove("show");
  d3.selectAll("path.country").classed("active",false); renderList(); }
backdrop.onclick=closePopup;
document.addEventListener("keydown",e=>{ if(e.key!=="Escape") return;
  if(fullOpen) closeFull(); else closePopup(); });

function renderStory(k){
  if(fullOpen) closeFull();
  const s=PROGRAM[k].stories, box=document.getElementById("storyBox"); if(!box||!s||!s.length) return;
  const idx=storyIdx%s.length, cur=s[idx];
  const rc=cur.role==="student"?"student":"educator", rl=cur.role==="student"?"Shared by a student":"Shared by an educator";
  document.getElementById("slider").innerHTML=
    s.map((st,i)=>`<img class="${i===idx?'on':''}" src="${st.img}" alt="Story ${i+1}">`).join("")+
    `<div class="cap">${cur.cap}</div>`+
    (s.length>1?`<button class="arw l" id="sPv">‹</button><button class="arw r" id="sNx">›</button>
      <div class="dots">${s.map((_,i)=>`<span class="dot ${i===idx?'on':''}"></span>`).join("")}</div>`:"");
  box.innerHTML=`<div class="story">
    <span class="role-badge ${rc}">${rl}</span>
    <div class="q">“${cur.q}”</div><div class="text">${cur.text}</div><div class="by">— ${cur.by}</div>
    <a class="full-link" id="fullLink">Read full story →</a></div>`;
  document.getElementById("fullLink").onclick=()=>openFull(k,idx);
  if(s.length>1){ document.getElementById("sPv").onclick=()=>{storyIdx=(idx-1+s.length)%s.length; renderStory(k);};
    document.getElementById("sNx").onclick=()=>{storyIdx=(idx+1)%s.length; renderStory(k);}; }
}

// ---------- SLIDER AUTOPLAY ----------
let autoTimer=null, autoPaused=false;
function startAuto(k){ stopAuto();
  const s=PROGRAM[k].stories; if(!s||s.length<2) return;
  autoTimer=setInterval(()=>{ if(!autoPaused && popup.classList.contains("show")){
    storyIdx=(storyIdx+1)%s.length; renderStory(k); } }, 4500);
}
function stopAuto(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } }
popup.addEventListener("mouseenter",()=>autoPaused=true);
popup.addEventListener("mouseleave",()=>autoPaused=false);

// ---------- READ FULL STORY (expand popup to the right) ----------
let fullOpen=false;
function openFull(k,idx){
  const cur=PROGRAM[k].stories[idx];
  const rl=cur.role==="student"?"Shared by a student":"Shared by an educator";
  const panel=document.getElementById("popFull");
  panel.innerHTML=`<div class="pop-full-inner">
    <button class="full-back" id="fullBack" aria-label="Back to summary">←</button>
    <div class="full-body">
      <div class="frole">${rl} · ${nameOf(k)}</div>
      <div class="fq">“${cur.q}”</div>
      <div class="ftext">${cur.full}</div>
      <div class="fby">— ${cur.by}</div>
    </div>
  </div>`;
  document.getElementById("fullBack").onclick=closeFull;
  panel.setAttribute("aria-hidden","false");
  fullOpen=true; autoPaused=true;
  popup.classList.add("expanded");
  keepInView();
}
function closeFull(){
  fullOpen=false; autoPaused=false;
  popup.classList.remove("expanded");
  const panel=document.getElementById("popFull");
  if(panel){ panel.innerHTML=""; panel.setAttribute("aria-hidden","true"); }
  keepInView();
}

// ---------- SIDE LIST ----------
let panelOpen=true;
const app=document.getElementById("app");
function setPanelOpen(open){
  panelOpen=open;
  app.classList.toggle("panel-collapsed",!open);
  const btn=document.getElementById("panelCollapse");
  const tab=document.getElementById("panelTab");
  if(btn){ btn.setAttribute("aria-expanded",open); btn.title=open?"Collapse country list":"Show country list"; }
  if(tab){ tab.setAttribute("aria-expanded",open); }
}
panel.innerHTML=`<div class="panel-head">
    <div class="list-title" id="listTitle">Where we work</div>
    <button type="button" class="panel-collapse" id="panelCollapse" aria-controls="panel" aria-expanded="true" title="Collapse country list">›</button>
  </div>
  <input class="search" id="search" placeholder="Search countries…" />
  <ul class="clist" id="clist"></ul>`;
document.getElementById("panelCollapse").onclick=()=>setPanelOpen(false);
document.getElementById("panelTab").onclick=()=>setPanelOpen(true);
document.getElementById("search").addEventListener("input",renderList);
function renderList(){
  const list=document.getElementById("clist"); if(!list) return;
  document.getElementById("listTitle").textContent="Where we work"+(activeRegion!=="All"?" · "+activeRegion:"");
  const q=(document.getElementById("search").value||"").toLowerCase();
  const keys=Object.keys(PROGRAM).filter(inRegion).filter(k=>nameOf(k).toLowerCase().includes(q))
    .sort((a,b)=>PROGRAM[b].students-PROGRAM[a].students);
  list.innerHTML=keys.map(k=>`<li data-k="${k}" style="${k===selected?'background:var(--served);color:#12331e;font-weight:700':''}">
    <span>${nameOf(k)}</span><span class="r" style="${k===selected?'color:#1c5230':''}">${PROGRAM[k].schools} schools</span></li>`).join("");
  [...list.children].forEach(li=>{
    li.onmouseenter=()=>d3.selectAll("path.country").filter(function(){return this.dataset.key===li.dataset.k;}).classed("active",true);
    li.onmouseleave=()=>d3.selectAll("path.country").filter(function(){return this.dataset.key===li.dataset.k;}).classed("active",li.dataset.k===selected);
    li.onclick=()=>openPopup(li.dataset.k,null);
  });
}
</script>
</body>
