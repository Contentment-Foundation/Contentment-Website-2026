<style>
  :root {
    --teal: #1fafc0;
    --deep: #024e70;
    --paper: #fbfaf7;
    --line: #d9dde2;
  }
  body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    background: var(--paper);
    color: #10212e;
    display: grid;
    grid-template-rows: auto auto auto auto 1fr;
    grid-template-columns: 1fr 320px;
    grid-template-areas:
      "top top"
      "feed feed"
      "timeline timeline"
      "tools tools"
      "board panel";
    height: 100vh;
  }
  .feed {
    grid-area: feed;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 5px 8px;
    border-bottom: 1px solid var(--line);
    background: #f3f7fa;
    font-size: 11px;
  }
  .timeline-wrap {
    grid-area: timeline;
    border-bottom: 1px solid var(--line);
    background: #fff;
    padding: 5px 8px;
  }
  .timeline-wrap summary {
    cursor: pointer;
    font-weight: 600;
    color: #204156;
  }
  .timeline {
    margin-top: 5px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .t-phase {
    min-width: 170px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 5px;
    background: #fafcfd;
  }
  .t-phase h4 {
    margin: 0 0 4px 0;
    font-size: 11px;
    color: #314a5e;
  }
  .t-chip {
    display: inline-block;
    margin: 2px;
    padding: 2px 6px;
    border-radius: 999px;
    border: 1px solid #bfd0db;
    background: #fff;
    font-size: 10px;
  }
  .event {
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    padding: 4px 8px;
    white-space: nowrap;
  }
  .topbar {
    grid-area: top;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 10px;
    background: var(--deep);
    color: #fff;
  }
  .topbar h1 {
    margin: 0;
    font-size: 14px;
  }
  .brand-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .brand-logo {
    width: 138px;
    height: auto;
    object-fit: contain;
    border-radius: 4px;
    background: #fff;
    padding: 2px 4px;
  }
  .brand-text {
    min-width: 0;
  }
  .brand-meta {
    font-size: 10px;
    opacity: 0.9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 760px;
  }
  .user-wrap {
    text-align: right;
    font-size: 10px;
    min-width: 180px;
  }
  .user {
    font-size: 11px;
    font-weight: 600;
  }
  .user-sub {
    opacity: 0.9;
  }
  .toolbar {
    grid-area: tools;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 6px 8px;
    border-bottom: 1px solid var(--line);
    background: #fff;
  }
  .toolbar input, .toolbar select {
    padding: 5px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 11px;
  }
  .inline {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #374550;
  }
  button {
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 11px;
    cursor: pointer;
  }
  button.secondary {
    background: #4b6375;
  }
  .btn-sleek {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 999px;
    line-height: 1;
    letter-spacing: 0.02em;
  }
  .board {
    grid-area: board;
    display: grid;
    grid-template-columns: repeat(6, minmax(190px, 1fr));
    gap: 6px;
    padding: 6px;
    overflow: auto;
  }
  .col {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
  }
  .col h3 {
    margin: 0;
    padding: 6px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
  }
  .col.drop-target {
    outline: 2px dashed var(--teal);
    outline-offset: -4px;
  }
  .cards {
    padding: 6px;
    display: grid;
    gap: 6px;
  }
  .card {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    background: #fff;
    cursor: pointer;
  }
  .card.dragging {
    opacity: 0.6;
  }
  .card .id {
    font-size: 10px;
    color: #5f6b76;
  }
  .card .title {
    font-weight: 600;
    margin: 2px 0;
    font-size: 12px;
  }
  .card .meta {
    font-size: 10px;
    color: #47525d;
  }
  .chip {
    display: inline-block;
    margin-top: 4px;
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
  }
  .chip.must, .chip.critical, .chip.high {
    background: #ffe5e5;
    color: #9d1f1f;
  }
  .chip.should, .chip.medium {
    background: #fff3da;
    color: #8b5e12;
  }
  .chip.nice, .chip.low {
    background: #e6f7ed;
    color: #1d6f3f;
  }
  .assignee-row {
    margin-top: 5px;
  }
  .assignee-row select {
    width: 100%;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 5px;
    font-size: 10px;
  }
  .status-row {
    margin-top: 5px;
  }
  .status-row select {
    width: 100%;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 5px;
    font-size: 10px;
  }
  .panel {
    grid-area: panel;
    border-left: 1px solid var(--line);
    background: #fff;
    padding: 8px;
    overflow: auto;
  }
  .decision-toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .decision-toolbar input {
    flex: 1;
    padding: 5px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 11px;
  }
  .decision-list {
    display: grid;
    gap: 6px;
    margin-bottom: 8px;
  }
  .decision {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    background: #fafcfd;
  }
  .decision-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .decision .topic {
    font-weight: 600;
    font-size: 12px;
  }
  .decision select {
    padding: 3px 5px;
    border-radius: 5px;
    border: 1px solid var(--line);
    font-size: 10px;
  }
  .decision .meta {
    font-size: 10px;
    color: #5f6b76;
  }
  .decision-card {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    background: #fff;
    cursor: pointer;
  }
  .decision-card .id {
    font-size: 10px;
    color: #5f6b76;
  }
  .decision-card .title {
    font-weight: 600;
    margin: 2px 0;
    font-size: 12px;
  }
  .issue-editor {
    margin: 5px 0;
    font-size: 11px;
    color: #41515f;
  }
  #decisionNotes {
    width: 100%;
    min-height: 70px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 6px;
    box-sizing: border-box;
  }
  .modal.hidden {
    display: none;
  }
  .modal {
    position: fixed !important;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    background: rgba(2, 15, 26, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }
  .modal-card {
    width: min(900px, 92vw);
    max-height: 88vh;
    overflow: auto;
    background: #fff;
    border-radius: 10px;
    border: 1px solid var(--line);
    padding: 10px;
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 6px;
  }
  .modal-grid label {
    display: grid;
    gap: 3px;
    font-size: 11px;
    color: #374550;
  }
  .modal-grid label.full {
    grid-column: 1 / -1;
  }
  .modal-grid input,
  .modal-grid textarea {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    font-size: 11px;
    box-sizing: border-box;
    width: 100%;
  }
  .modal-grid textarea {
    min-height: 65px;
  }
  .modal-actions {
    margin-top: 8px;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  #comments {
    margin: 6px 0;
    display: grid;
    gap: 6px;
  }
  .comment {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px;
    background: #fafcfd;
  }
  .comment .by {
    font-size: 10px;
    color: #5f6b76;
    margin-bottom: 2px;
  }
  #commentText {
    width: 100%;
    min-height: 60px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 6px;
    box-sizing: border-box;
  }
</style>
