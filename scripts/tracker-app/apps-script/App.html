<script>
  let state = { issues: [], comments: [], decisions: [], activity: [], userEmail: "", statuses: [], teamMembers: [] };
  let selectedIssueId = null;
  let selectedDecisionId = null;
  let lastIssueId = null;
  let draggedIssueId = null;
  const columnOrder = ["Open", "In Progress", "Blocked", "Pending", "Done"];

  function callServer(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((err) => reject(err && err.message ? err.message : String(err)))
        [fn](...args);
    });
  }

  async function refresh() {
    state = await callServer("getBoardData");
    document.getElementById("userEmail").textContent = state.userEmail;
    document.getElementById("weeklyEmail").value = state.weeklyRecipient || "";
    hydrateFilterOptions();
    renderActivityFeed();
    renderTimeline();
    renderBoard();
    renderDecisions();
    renderPanel();
    renderDecisionDrawer();
  }

  function filteredIssues() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    const owner = document.getElementById("filterOwner").value;
    const phase = document.getElementById("filterPhase").value;
    const mine = document.getElementById("myItemsOnly").checked;
    return state.issues.filter((i) => {
      if (q) {
        const hay = `${i.id || ""} ${i.title || ""} ${i.blocker || ""}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (owner && (i.owner || "") !== owner) return false;
      if (phase && String(i.phase || "") !== phase) return false;
      if (mine && (i.owner || "") !== state.userEmail) return false;
      return true;
    });
  }

  function hydrateFilterOptions() {
    const owners = [...new Set(state.issues.map((i) => i.owner).filter(Boolean))].sort();
    const phases = [...new Set(state.issues.map((i) => String(i.phase || "")).filter(Boolean))].sort();
    const ownerSel = document.getElementById("filterOwner");
    const phaseSel = document.getElementById("filterPhase");
    ownerSel.innerHTML = '<option value="">All owners</option>' + owners.map((o) => `<option>${escapeHtml(o)}</option>`).join("");
    phaseSel.innerHTML = '<option value="">All phases</option>' + phases.map((p) => `<option>${escapeHtml(p)}</option>`).join("");
  }

  function renderActivityFeed() {
    const el = document.getElementById("activityFeed");
    const events = (state.activity || []).slice(0, 12);
    el.innerHTML = events.length
      ? events
          .map(
            (e) =>
              `<div class="event">${escapeHtml(e.actor_email || "unknown")} • ${escapeHtml(
                e.action || "update"
              )} • ${escapeHtml(e.entity_id || "")}</div>`
          )
          .join("")
      : '<div class="event">No activity yet</div>';
  }

  function renderTimeline() {
    const el = document.getElementById("timeline");
    const rangeStart = new Date("2026-08-03T00:00:00");
    const rangeEnd = new Date("2026-08-14T00:00:00");
    const dayMs = 24 * 60 * 60 * 1000;
    const days = [];
    for (let d = new Date(rangeStart); d <= rangeEnd; d = new Date(d.getTime() + dayMs)) {
      const iso = d.toISOString().slice(0, 10);
      days.push({ iso, label: d.toLocaleDateString(undefined, { month: "short", day: "numeric" }), tickets: [] });
    }

    function dayIndexFromDate(value) {
      if (!value) return -1;
      const parsed = new Date(value);
      if (isNaN(parsed.getTime())) return -1;
      const iso = parsed.toISOString().slice(0, 10);
      return days.findIndex((x) => x.iso === iso);
    }

    const noDateIssues = [];
    (state.issues || []).forEach((issue) => {
      let idx = dayIndexFromDate(issue.start_date);
      if (idx < 0) {
        noDateIssues.push(issue);
      } else {
        if (idx >= days.length) idx = days.length - 1;
        days[idx].tickets.push(issue);
      }
    });
    noDateIssues
      .slice()
      .sort((a, b) => String(a.id || "").localeCompare(String(b.id || "")))
      .forEach((issue, i, arr) => {
        const idx = Math.min(days.length - 1, Math.floor((i * days.length) / Math.max(1, arr.length)));
        days[idx].tickets.push(issue);
      });

    el.innerHTML = days
      .map((day) => {
        const chips = day.tickets
          .slice()
          .sort((a, b) => String(a.id || "").localeCompare(String(b.id || "")))
          .map((i) => `<span class="t-chip" title="${escapeHtml(i.title || "")}">${escapeHtml(i.id || "—")} • ${escapeHtml(i.status || "")}</span>`)
          .join("");
        return `<div class="t-phase"><h4>${escapeHtml(day.label)} (${escapeHtml(day.iso)})</h4>${chips || '<span class="t-chip">No tickets</span>'}</div>`;
      })
      .join("");
  }

  function renderBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    const issues = filteredIssues();

    // Decisions column first (left-most)
    {
      const dCol = document.createElement("div");
      dCol.className = "col";
      dCol.innerHTML = `<h3>Decisions</h3><div class="cards"></div>`;
      const dCards = dCol.querySelector(".cards");
      (state.decisions || []).forEach((d) => {
        const card = document.createElement("div");
        card.className = "decision-card";
        card.innerHTML = `
          <div class="id">${d.decision_id || ""}</div>
          <div class="title">${escapeHtml(d.topic || "(no topic)")}</div>
          <div class="meta">${escapeHtml(d.owner || "Unassigned")} • ${escapeHtml(d.impact || "")}</div>
          <div class="status-row">
            <select data-decision-id="${escapeHtml(d.decision_id || "")}">
              ${(state.decisionStatuses || ["Open", "Recommended", "Resolved"])
                .map((s) => `<option ${s === d.status ? "selected" : ""}>${s}</option>`)
                .join("")}
            </select>
          </div>
          <div class="status-row">
            <button class="btn-sleek secondary" data-open-decision-id="${escapeHtml(d.decision_id || "")}">Details</button>
          </div>
        `;
        card.addEventListener("click", (e) => {
          if (e.target.tagName !== "SELECT" && e.target.tagName !== "OPTION") {
            selectedDecisionId = d.decision_id;
            selectedIssueId = null;
            renderPanel();
            renderDecisionDrawer();
          }
        });
        const statusSel = card.querySelector("select[data-decision-id]");
        statusSel.addEventListener("change", async (e) => {
          await callServer("upsertDecision", {
            decision_id: d.decision_id,
            topic: d.topic,
            owner: d.owner,
            impact: d.impact,
            notes: d.notes,
            status: e.target.value,
          });
          await refresh();
        });
        const dBtn = card.querySelector("button[data-open-decision-id]");
        dBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          selectedDecisionId = d.decision_id;
          selectedIssueId = null;
          renderPanel();
          renderDecisionDrawer();
        });
        dCards.appendChild(card);
      });
      board.appendChild(dCol);
    }

    columnOrder.forEach((status) => {
      const col = document.createElement("div");
      col.className = "col";
      col.dataset.status = status;
      col.innerHTML = `<h3>${status}</h3><div class="cards"></div>`;
      const cardsEl = col.querySelector(".cards");
      col.addEventListener("dragover", (e) => {
        e.preventDefault();
        col.classList.add("drop-target");
      });
      col.addEventListener("dragleave", () => col.classList.remove("drop-target"));
      col.addEventListener("drop", async (e) => {
        e.preventDefault();
        col.classList.remove("drop-target");
        if (!draggedIssueId) return;
        await callServer("updateIssueStatus", draggedIssueId, status);
        draggedIssueId = null;
        await refresh();
      });

      issues
        .filter((i) => (i.status || "Open") === status)
        .forEach((issue) => {
          const ownerOptions = (state.teamMembers || []).slice();
          const currentOwnerName = String(issue.owner || "").split("@")[0];
          if (currentOwnerName && ownerOptions.indexOf(currentOwnerName) === -1) {
            ownerOptions.push(currentOwnerName);
          }
          ownerOptions.sort();
          const priorityOptions = state.priorities || ["Must", "Should", "Nice", "High", "Medium", "Low"];
          const priorityClass = String(issue.priority || "")
            .toLowerCase()
            .replace(/\s+/g, "");
          const card = document.createElement("div");
          card.className = "card";
          card.draggable = true;
          card.innerHTML = `
            <div class="id">${escapeHtml(issue.id || "")}</div>
            <div class="title">${escapeHtml(issue.title || "(untitled)")}</div>
            <div class="meta">${escapeHtml(issue.owner || "Unassigned")} • ${escapeHtml(issue.priority || "")} • Phase ${escapeHtml(String(issue.phase || ""))}</div>
            <span class="chip ${priorityClass}">${escapeHtml(issue.priority || "—")}</span>
            <div class="assignee-row">
              <select data-owner-id="${issue.id}">
                <option value="">Unassigned</option>
                ${ownerOptions
                  .map(
                    (o) => {
                      const ownerEmail = o.includes("@") ? o : `${o.toLowerCase()}@contentment.org`;
                      return `<option value="${escapeHtml(o)}" ${ownerEmail === (issue.owner || "") || o === (issue.owner || "") ? "selected" : ""}>${escapeHtml(o)}</option>`;
                    }
                  )
                  .join("")}
              </select>
            </div>
            <div class="assignee-row">
              <select data-priority-id="${issue.id}">
                ${priorityOptions
                  .map(
                    (p) => `<option value="${escapeHtml(p)}" ${p === (issue.priority || "") ? "selected" : ""}>Priority: ${escapeHtml(p)}</option>`
                  )
                  .join("")}
              </select>
            </div>
            <div class="status-row">
              <select data-id="${issue.id}">
                ${state.statuses.map((s) => `<option ${s === issue.status ? "selected" : ""}>${s}</option>`).join("")}
              </select>
            </div>
            <div class="status-row">
              <button class="btn-sleek secondary" data-open-ticket-id="${issue.id}">Details</button>
            </div>
          `;
          card.addEventListener("click", (e) => {
            if (e.target.tagName !== "SELECT" && e.target.tagName !== "OPTION") {
              selectedIssueId = issue.id;
              lastIssueId = issue.id;
              selectedDecisionId = null;
              renderPanel();
              renderDecisionDrawer();
            }
          });
          card.addEventListener("dblclick", (e) => {
            if (e.target.tagName !== "SELECT" && e.target.tagName !== "OPTION" && e.target.tagName !== "BUTTON") {
              openTicketModal(issue.id);
            }
          });
          card.addEventListener("dragstart", () => {
            draggedIssueId = issue.id;
            card.classList.add("dragging");
          });
          card.addEventListener("dragend", () => card.classList.remove("dragging"));
          const sel = card.querySelector("select[data-id]");
          sel.addEventListener("change", async (e) => {
            await callServer("updateIssueStatus", issue.id, e.target.value);
            await refresh();
          });
          const ownerSel = card.querySelector("select[data-owner-id]");
          ownerSel.addEventListener("change", async (e) => {
            await callServer("updateIssueField", issue.id, "owner", e.target.value);
            await refresh();
          });
          const prioritySel = card.querySelector("select[data-priority-id]");
          prioritySel.addEventListener("change", async (e) => {
            await callServer("updateIssueField", issue.id, "priority", e.target.value);
            await refresh();
          });
          const detailsBtn = card.querySelector("button[data-open-ticket-id]");
          detailsBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            lastIssueId = issue.id;
            openTicketModal(issue.id);
          });
          cardsEl.appendChild(card);
        });

      board.appendChild(col);
    });
  }

  function renderDecisions() {
    const el = document.getElementById("decisions");
    if (!el) return;
    const list = (state.decisions || []).slice().sort((a, b) => String(a.decision_id || "").localeCompare(String(b.decision_id || "")));
    el.innerHTML = list
      .map(
        (d) => `
        <div class="decision">
          <div class="decision-top" data-decision-id="${escapeHtml(d.decision_id || "")}">
            <div class="topic">${escapeHtml(d.decision_id || "")}: ${escapeHtml(d.topic || "")}</div>
            <select data-decision-id="${escapeHtml(d.decision_id || "")}">
              ${(state.decisionStatuses || ["Open", "Recommended", "Resolved"]).map((s) => `<option ${s === d.status ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </div>
          <div class="meta">${escapeHtml(d.owner || "Unassigned")} • ${escapeHtml(d.impact || "")}</div>
        </div>
      `
      )
      .join("");
    el.querySelectorAll("select[data-decision-id]").forEach((sel) => {
      sel.addEventListener("change", async (e) => {
        const id = e.target.getAttribute("data-decision-id");
        const existing = (state.decisions || []).find((d) => d.decision_id === id);
        if (!existing) return;
        await callServer("upsertDecision", {
          decision_id: id,
          topic: existing.topic,
          owner: existing.owner,
          impact: existing.impact,
          notes: existing.notes,
          status: e.target.value,
        });
        await refresh();
      });
    });
    el.querySelectorAll(".decision-top[data-decision-id]").forEach((node) => {
      node.addEventListener("click", () => {
        selectedDecisionId = node.getAttribute("data-decision-id");
        renderDecisionDrawer();
      });
    });
  }

  function renderPanel() {
    const meta = document.getElementById("issueMeta");
    const commentsEl = document.getElementById("comments");
    commentsEl.innerHTML = "";

    if (!selectedIssueId) {
      if (selectedDecisionId) {
        const d = (state.decisions || []).find((x) => x.decision_id === selectedDecisionId);
        meta.innerHTML = d
          ? `<strong>${escapeHtml(d.topic || "")}</strong><br>${escapeHtml(d.decision_id || "")} • ${escapeHtml(d.status || "")} • ${escapeHtml(d.owner || "Unassigned")}`
          : "Decision selected.";
      } else {
        meta.textContent = "Select a card to view details.";
      }
      document.getElementById("issueEditor").innerHTML = "";
      return;
    }
    const issue = state.issues.find((i) => i.id === selectedIssueId);
    if (!issue) {
      meta.textContent = "Issue not found.";
      return;
    }
    meta.innerHTML = `<strong>${escapeHtml(issue.title || "")}</strong><br>${escapeHtml(issue.id || "")} • ${escapeHtml(issue.status || "")} • ${escapeHtml(issue.owner || "Unassigned")}`;
    document.getElementById("issueEditor").innerHTML = `
      <div><strong>Blocker:</strong> ${escapeHtml(issue.blocker || "—")}</div>
      <div><strong>Depends on:</strong> ${escapeHtml(issue.depends_on || "—")}</div>
      <div><strong>Updated by:</strong> ${escapeHtml(issue.updated_by || "—")} • ${escapeHtml(issue.updated_at || "")}</div>
    `;
    state.comments
      .filter((c) => c.issue_id === selectedIssueId)
      .forEach((c) => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `<div class="by">${c.author_email || "unknown"} • ${c.created_at || ""}</div><div>${escapeHtml(c.comment_text || "")}</div>`;
        commentsEl.appendChild(div);
      });
  }

  function openTicketModal(issueId) {
    const targetId = issueId || selectedIssueId || lastIssueId;
    if (!targetId) {
      alert("Select an issue first.");
      return;
    }
    const modalEl = document.getElementById("ticketModal");
    const commentsEl = document.getElementById("m_comments");
    if (!modalEl || !commentsEl) {
      alert("Ticket modal elements are missing. Please re-paste latest Index.html and redeploy web app.");
      return;
    }
    const issue = state.issues.find((i) => i.id === targetId);
    if (!issue) return;
    selectedIssueId = issue.id;
    lastIssueId = issue.id;
    const comments = state.comments
      .filter((c) => c.issue_id === targetId)
      .map((c) => `${c.author_email || "unknown"} (${c.created_at || ""})\n${c.comment_text || ""}`)
      .join("\n\n");

    const fields = [
      "id",
      "title",
      "description",
      "status",
      "priority",
      "owner",
      "phase",
      "start_date",
      "due_date",
      "timeline_note",
      "depends_on",
      "blocker",
      "source_ticket",
      "context",
      "attachments",
    ];
    fields.forEach((f) => {
      const el = document.getElementById(`m_${f}`);
      if (el) el.value = issue[f] || "";
    });
    commentsEl.value = comments || "No comments yet.";
    modalEl.classList.remove("hidden");
    modalEl.style.display = "flex"; // fallback if class-based CSS is stale
    modalEl.setAttribute("aria-hidden", "false");
  }

  function closeTicketModal() {
    const modalEl = document.getElementById("ticketModal");
    if (modalEl) {
      modalEl.classList.add("hidden");
      modalEl.style.display = "none";
      modalEl.setAttribute("aria-hidden", "true");
    }
  }

  async function saveTicketModal() {
    if (!document.getElementById("m_id")) {
      alert("Ticket modal form is missing. Please redeploy latest web app.");
      return;
    }
    const payload = {
      id: document.getElementById("m_id").value.trim(),
      title: document.getElementById("m_title").value.trim(),
      description: document.getElementById("m_description").value,
      status: document.getElementById("m_status").value.trim(),
      priority: document.getElementById("m_priority").value.trim(),
      owner: document.getElementById("m_owner").value.trim(),
      phase: document.getElementById("m_phase").value.trim(),
      start_date: document.getElementById("m_start_date").value,
      due_date: document.getElementById("m_due_date").value,
      timeline_note: document.getElementById("m_timeline_note").value,
      depends_on: document.getElementById("m_depends_on").value,
      blocker: document.getElementById("m_blocker").value,
      source_ticket: document.getElementById("m_source_ticket").value,
      context: document.getElementById("m_context").value,
      attachments: document.getElementById("m_attachments").value,
    };
    if (!payload.id) return alert("Ticket ID is missing.");
    await callServer("upsertIssue", payload);
    closeTicketModal();
    await refresh();
  }

  function renderDecisionDrawer() {
    const meta = document.getElementById("decisionMeta");
    const notesEl = document.getElementById("decisionNotes");
    if (!selectedDecisionId) {
      meta.textContent = "Select a decision to edit notes.";
      notesEl.value = "";
      return;
    }
    const d = (state.decisions || []).find((x) => x.decision_id === selectedDecisionId);
    if (!d) {
      meta.textContent = "Decision not found.";
      notesEl.value = "";
      return;
    }
    meta.innerHTML = `<strong>${escapeHtml(d.decision_id || "")}</strong> • ${escapeHtml(d.topic || "")}<br>${escapeHtml(d.status || "")} • ${escapeHtml(d.owner || "Unassigned")}`;
    notesEl.value = d.notes || "";
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  async function addIssue() {
    const titleEl = document.getElementById("newIssueTitle");
    const statusEl = document.getElementById("newIssueStatus");
    const title = titleEl.value.trim();
    if (!title) return;
    await callServer("upsertIssue", { title, status: statusEl.value, owner: state.userEmail });
    titleEl.value = "";
    await refresh();
  }

  async function addDecision() {
    const topicEl = document.getElementById("decisionTopic");
    const topic = topicEl.value.trim();
    if (!topic) return;
    await callServer("upsertDecision", {
      topic,
      owner: state.userEmail,
      impact: "Medium",
      status: "Open",
      notes: "",
    });
    topicEl.value = "";
    await refresh();
  }

  async function saveDecisionNotes() {
    if (!selectedDecisionId) {
      alert("Select a decision first.");
      return;
    }
    const notes = document.getElementById("decisionNotes").value;
    await callServer("updateDecisionNotes", selectedDecisionId, notes);
    await refresh();
  }

  async function exportCsv() {
    const csv = await callServer("getTrackerCsv");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `tracker-export-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function saveWeeklyEmail() {
    const email = document.getElementById("weeklyEmail").value.trim();
    if (!email) return alert("Enter an email first.");
    const result = await callServer("setWeeklySummaryRecipient", email);
    alert("Weekly summary recipients saved: " + (result.recipients || []).join(", "));
    await refresh();
  }

  async function installWeekly() {
    await callServer("installWeeklySummaryTrigger");
    alert("Weekly summary trigger installed (Monday 9am script timezone).");
  }

  async function sendWeeklyNow() {
    const email = document.getElementById("weeklyEmail").value.trim();
    if (!email) return alert("Set email first.");
    await callServer("sendWeeklySummaryEmail", email);
    alert("Weekly summary sent.");
    await refresh();
  }

  async function addComment() {
    if (!selectedIssueId) {
      alert("Select an issue first.");
      return;
    }
    const textEl = document.getElementById("commentText");
    const text = textEl.value.trim();
    if (!text) return;
    await callServer("addComment", selectedIssueId, text);
    textEl.value = "";
    await refresh();
  }

  document.getElementById("refreshBtn").addEventListener("click", refresh);
  document.getElementById("addIssueBtn").addEventListener("click", addIssue);
  document.getElementById("addDecisionBtn").addEventListener("click", addDecision);
  document.getElementById("addCommentBtn").addEventListener("click", addComment);
  document.getElementById("saveDecisionNotesBtn").addEventListener("click", saveDecisionNotes);
  document.getElementById("exportCsvBtn").addEventListener("click", exportCsv);
  document.getElementById("saveWeeklyEmailBtn").addEventListener("click", saveWeeklyEmail);
  document.getElementById("installWeeklyBtn").addEventListener("click", installWeekly);
  document.getElementById("sendWeeklyNowBtn").addEventListener("click", sendWeeklyNow);
  document.getElementById("searchInput").addEventListener("input", renderBoard);
  document.getElementById("filterOwner").addEventListener("change", renderBoard);
  document.getElementById("filterPhase").addEventListener("change", renderBoard);
  document.getElementById("myItemsOnly").addEventListener("change", renderBoard);
  document.getElementById("openTicketModalBtn").addEventListener("click", openTicketModal);
  document.getElementById("closeTicketModalBtn").addEventListener("click", closeTicketModal);
  document.getElementById("saveTicketModalBtn").addEventListener("click", saveTicketModal);
  document.getElementById("ticketModal").addEventListener("click", (e) => {
    if (e.target.id === "ticketModal") closeTicketModal();
  });

  refresh();
  setInterval(refresh, 30000);

  // Delegate click so card selection is reliable even after re-renders.
  document.addEventListener("click", (e) => {
    const card = e.target.closest(".card");
    if (!card) return;
    if (e.target.tagName === "SELECT" || e.target.tagName === "OPTION") return;
    const idNode = card.querySelector(".id");
    if (idNode && idNode.textContent) {
      selectedIssueId = idNode.textContent.trim();
      renderPanel();
    }
  });
</script>
