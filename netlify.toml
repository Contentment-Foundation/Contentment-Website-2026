# Netlify config for contentment.org static site
# The homepage lives in site/ — not the repo root.

[build]
  publish = "site"
  command = "bash scripts/copy-docs.sh"

# Docs hub + briefs (source: docs/*.html, copied at build)
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200

[[redirects]]
  from = "/docs/tech-brief"
  to = "/docs/tech-brief/index.html"
  status = 200

[[redirects]]
  from = "/docs/team-brief"
  to = "/docs/team-brief/index.html"
  status = 200

[[redirects]]
  from = "/docs/growth-brief"
  to = "/docs/growth-brief/index.html"
  status = 200

[[redirects]]
  from = "/docs/automation-brief"
  to = "/docs/automation-brief/index.html"
  status = 200

# Foundation Reach map — team design prototype (not on homepage yet)
[[redirects]]
  from = "/foundation-reach-map"
  to = "/foundation-reach-map.html"
  status = 200

# Story Board — team design prototype (not on homepage yet)
[[redirects]]
  from = "/story-board"
  to = "/story-board.html"
  status = 200

[[redirects]]
  from = "/story-board-feed-guide"
  to = "/story-board-feed-guide.html"
  status = 200

# Old flat URLs → nested under /docs/
[[redirects]]
  from = "/tech-brief"
  to = "/docs/tech-brief"
  status = 301

[[redirects]]
  from = "/team-brief"
  to = "/docs/team-brief"
  status = 301

[[redirects]]
  from = "/growth-brief"
  to = "/docs/growth-brief"
  status = 301

# Legacy filenames → canonical slugs
[[redirects]]
  from = "/TECH-BRIEF.html"
  to = "/docs/tech-brief"
  status = 301

[[redirects]]
  from = "/TEAM-BRIEF.html"
  to = "/docs/team-brief"
  status = 301

[[redirects]]
  from = "/GROWTH-BRIEF.html"
  to = "/docs/growth-brief"
  status = 301
