# Netlify config for contentment.org static site
# The homepage lives in site/ — not the repo root.

[build]
  publish = "site"
  command = """
    mkdir -p site/docs/tech-brief site/docs/team-brief site/docs/growth-brief &&
    cp docs/index.html site/docs/index.html &&
    cp docs/TECH-BRIEF.html site/docs/tech-brief/index.html &&
    cp docs/TEAM-BRIEF.html site/docs/team-brief/index.html &&
    cp docs/GROWTH-BRIEF.html site/docs/growth-brief/index.html
  """

# Docs hub + briefs (source: docs/*.html, copied at build)
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200

[[redirects]]
  from = "/docs/tech-brief"
  to = "/docs/tech-brief/index.html"
  status = 200

[[redirects]]
  from = "/docs/team-brief"
  to = "/docs/team-brief/index.html"
  status = 200

[[redirects]]
  from = "/docs/growth-brief"
  to = "/docs/growth-brief/index.html"
  status = 200

# Old flat URLs → nested under /docs/
[[redirects]]
  from = "/tech-brief"
  to = "/docs/tech-brief"
  status = 301

[[redirects]]
  from = "/team-brief"
  to = "/docs/team-brief"
  status = 301

[[redirects]]
  from = "/growth-brief"
  to = "/docs/growth-brief"
  status = 301

# Legacy filenames → canonical slugs
[[redirects]]
  from = "/TECH-BRIEF.html"
  to = "/docs/tech-brief"
  status = 301

[[redirects]]
  from = "/TEAM-BRIEF.html"
  to = "/docs/team-brief"
  status = 301

[[redirects]]
  from = "/GROWTH-BRIEF.html"
  to = "/docs/growth-brief"
  status = 301
